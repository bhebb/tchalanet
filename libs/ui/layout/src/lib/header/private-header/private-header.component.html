<header class="tch-header" role="banner">
  <div class="tch-header__toolbar">
    <nav class="tch-header__grid" aria-label="Entête privée">
      <!-- ROW L1: burger | brand | outils (search/lang/theme/account) -->
      <div class="tch-header__row tch-header__row--l1">
        <!-- Brand + burger (colonne gauche) -->
        <div class="tch-header__brand-slot">
          <!-- Burger (ouvre la sidebar gauche du dashboard) -->
          <button
            class="tch-header__icon-btn tch-header__icon-btn--burger"
            type="button"
            aria-label="Ouvrir le menu latéral"
            (click)="onToggleSidebar()"
          >
            <mat-icon>menu</mat-icon>
          </button>

          <!-- Brand clickable (retour au hub privé / dashboard) -->
          <button
            class="tch-header__brand-btn"
            type="button"
            aria-label="Aller au tableau de bord"
            (click)="onBrandClick()"
          >
            <tchl-brand [brand]="vm().brand"></tchl-brand>
          </button>
        </div>

        <!-- Pas de navigation horizontale dans le header privé : tout se fait via la sidebar -->
        <div class="tch-header__nav-slot" aria-hidden="true"></div>

        <!-- Colonne droite: search + lang/theme + account -->
        <div class="tch-header__actions-slot">
          <!-- bloc CTA (non utilisé en privé pour l’instant, mais conservé pour alignement DS) -->
          <div class="tch-header__actions-primary"></div>

          <!-- bloc utilitaires: search, lang/theme, account -->
          <div class="tch-header__actions-utility">
            <!-- Search (tablet+/desktop montre ici, mobile va en L2) -->
            @if (!vm().handset && vm().showSearch) {
              <button
                class="tch-header__icon-btn"
                type="button"
                aria-label="Rechercher"
                (click)="onSearchClick()"
              >
                <mat-icon>search</mat-icon>
              </button>
            }

            <!-- Lang/Theme (tablet+/desktop inline) -->
            @if (!vm().handset && vm().showLangTheme) {
              <tchl-lang-theme-group
                class="tch-header__ltg"
                [currentLang]="currentLang()"
                [availableLangs]="availableLangs()"
                [themeMode]="themeMode()"
                [size]="32"
                [gap]="10"
                (changeLang)="onChangeLang($event)"
                (toggleTheme)="onToggleTheme($event)"
              ></tchl-lang-theme-group>
            }

            <!-- Account avatar / menu -->
            <button
              class="tch-header__icon-btn tch-header__icon-btn--account avatar"
              type="button"
              aria-haspopup="menu"
              [matMenuTriggerFor]="accountMenu"
            >
              @if (user().avatarUrl) {
                <img [src]="user().avatarUrl!" alt="" />
              } @else {
                <span class="initials" aria-hidden="true">{{ initials() }}</span>
              }
            </button>

            <!-- Menu compte (mon compte / déconnexion) -->
            <mat-menu #accountMenu="matMenu" aria-label="Menu utilisateur : Mon compte, Déconnexion">
              <button mat-menu-item type="button" (click)="onAccountClick()">
                <mat-icon>account_circle</mat-icon>
                <span>Mon compte</span>
              </button>
              <button mat-menu-item type="button" (click)="onSignOutClick()">
                <mat-icon>logout</mat-icon>
                <span>Déconnexion</span>
              </button>
            </mat-menu>
          </div>
        </div>
      </div>

      <!-- ROW L2 (mobile only): search + lang/theme en dessous de la brand -->
      @if (vm().showRow2MobileTools) {
        <div class="tch-header__row tch-header__row--l2">
          <div class="tch-header__actions-utility">
            @if (vm().showSearch) {
              <button
                class="tch-header__icon-btn"
                type="button"
                aria-label="Rechercher"
                (click)="onSearchClick()"
              >
                <mat-icon>search</mat-icon>
              </button>
            }

            @if (vm().showLangTheme) {
              <tchl-lang-theme-group
                class="tch-header__ltg"
                [currentLang]="currentLang()"
                [availableLangs]="availableLangs()"
                [themeMode]="themeMode()"
                [size]="32"
                [gap]="10"
                (changeLang)="onChangeLang($event)"
                (toggleTheme)="onToggleTheme($event)"
              ></tchl-lang-theme-group>
            }
          </div>
        </div>
      }
    </nav>
  </div>
</header>
