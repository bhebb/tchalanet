<header
        class="tch-header"
        role="banner"
>
    <div class="tch-header__toolbar">
        <div
                class="tch-header__grid"
                aria-label="Entête"
        >
            <tchl-header-row-main
                    [vm]="vm()"
                    (burgerClick)="onBurgerClick()"
                    (searchClick)="onSearchClick()"
                    (brandClick)="onBrandHome()"
                    (changeLang)="onChangeLang($event)"
                    (toggleTheme)="onToggleTheme($event)"
                    (navSelect)="go($event)"
                    (accountClick)="onAccountClick()"
            />

            <tchl-header-row-secondary
                    [vm]="vm()"
                    (searchClick)="onSearchClick()"
                    (changeLang)="onChangeLang($event)"
                    (toggleTheme)="onToggleTheme($event)"
                    (navSelect)="go($event)"
            />
        </div>
    </div>
</header>
