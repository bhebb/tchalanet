<div
        class="tch-overlay-nav"
        [class.tch-overlay-nav--open]="open()"
        role="dialog"
        aria-modal="true"
>
    <div class="tch-overlay-nav__panel">
        <header class="tch-overlay-nav__bar">
            <div class="tch-overlay-nav__brand">
                <span class="tch-overlay-nav__brand-name">Tchalanet</span>
            </div>

            <button
                    class="tch-overlay-nav__close"
                    type="button"
                    (click)="onClose()"
                    aria-label="Fermer le menu"
            >
                <mat-icon>close</mat-icon>
            </button>
        </header>

        <nav class="tch-overlay-nav__content" aria-label="Navigation">
            @for (item of items() || []; track item.path) {
                <a
                        class="tch-overlay-nav__item"
                        [routerLink]="item.path"
                        routerLinkActive="active"
                        #rla="routerLinkActive"
                        [attr.aria-current]="rla.isActive ? 'page' : null"
                        (click)="handleNav(item.path)"
                        [routerLinkActiveOptions]="{ exact: true }"
                >
                    @if (item.icon) {
                        <mat-icon class="tch-overlay-nav__icon">{{ item.icon }}</mat-icon>
                    }
                    <span class="tch-overlay-nav__label">{{ item.labelKey | translate }}</span>
                </a>
            }
        </nav>
    </div>
</div>
