<a class="tch-shell__skip-link" href="#content">Skip to content</a>

<!-- Header global -->
<ng-content select="[shell-header]"></ng-content>

<div class="tch-shell__layout">
    <!-- Sidebar zone -->
    @if (hasSidebar()) {
        <aside class="tch-shell__side">
            <ng-content select="[sidenav]"></ng-content>
        </aside>
    }

    <!-- Contenu principal -->
    <main id="content" class="tch-shell__main container" role="main">
        <ng-content select="[breadcrumb]"></ng-content>
        <ng-content></ng-content>
    </main>
</div>

<!-- Footer global -->
<ng-content select="[shell-footer]"></ng-content>
