<tchl-shell [hasSidebar]="true">
    <tchl-private-header
            shell-header
            [properties]="headerProps()!"
            [user]="userInfo()"
            [flags]="flags()"
            (toggleSidebar)="onToggleSidebar()"
            (signOut)="onSignOut()"
    ></tchl-private-header>

    <!-- sidebar gauche -->
    <tchl-sidebar-nav
            sidenav
            [links]="sideLinks()"
            [features]="flags()"
    ></tchl-sidebar-nav>

    <!-- breadcrumb seulement en privé -->
    <tchl-breadcrumb breadcrumb />

    <router-outlet />

    <tchl-footer
            shell-footer
            [properties]="page()?.footer?.properties!"
    ></tchl-footer>
</tchl-shell>
