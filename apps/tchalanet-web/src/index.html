<!DOCTYPE html>
<html lang="fr" data-theme="tchalanet">
<head>
    <meta charset="utf-8"/>
    <title>tchalanet-web</title>
    <base href="/"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1" rel="stylesheet">
    <!-- Material Symbols Outlined -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        /* make all <mat-icon> use Material Symbols Outlined by default */
        .mat-icon, .material-symbols-outlined {
            font-family: "Material Symbols Outlined";
            font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
            line-height: 1;
        }
    </style>


    <!-- Google Analytics (gtag) init: uses import.meta.env.VITE_GA_MEASUREMENT_ID or window.__GA_MEASUREMENT_ID -->
    <script type="module">
      (function() {
        try {
          // Vite will replace import.meta.env.VITE_GA_MEASUREMENT_ID at build time
          const id = (import.meta.env.VITE_GA_MEASUREMENT_ID || window.__GA_MEASUREMENT_ID || '').trim();
          if (id) {
            const s1 = document.createElement('script');
            s1.async = true;
            s1.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
            document.head.appendChild(s1);
            (globalThis as any).dataLayer = (globalThis as any).dataLayer || [];
            function gtag(){(globalThis as any).dataLayer.push(arguments);}
            (globalThis as any).gtag = gtag;
            gtag('js', new Date());
            gtag('config', id, { 'anonymize_ip': true });
          }
        } catch (e) { console.warn('GA init failed', e); }
      })();
    </script>


</head>
<body class="tch-theme" id="theme-root">
    <tch-root></tch-root>
</body>
</html>
