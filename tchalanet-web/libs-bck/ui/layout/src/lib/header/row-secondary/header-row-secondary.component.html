<div class="tch-header__row tch-header__row--l2">
    @if (vm().handset) {
        @if (vm().ctaLabel && vm().ctaPath) {
            <button
                    class="tch-header__cta-btn tch-header__cta-btn--mobile"
                    type="button"
                    (click)="navSelect.emit(vm().ctaPath!)"
            >
                {{ vm().ctaLabel | translate }}
            </button>
        }

        @if (vm().showLangTheme) {
            <tchl-lang-theme-group
                    class="tch-header__ltg tch-header__ltg--mobile"
                    [currentLang]="vm().langState.currentLang"
                    [availableLangs]="vm().langState.availableLangs"
                    [themeMode]="vm().themeMode"
                    [size]="32"
                    [gap]="10"
                    (changeLang)="changeLang.emit($event)"
                    (toggleTheme)="toggleTheme.emit($event)"
            />
        }
    }

<!-- Tablet: on peut mettre la nav horizontale ici si tu veux qu’elle vive en L2 et pas L1 -->
    @if (vm().tablet && !vm().handset) {
        <tchl-nav
                class="tch-header__nav tch-header__nav--tablet"
                [items]="vm().navItems"
                [currentPath]="vm().currentPath"
                (selectNavItem)="navSelect.emit($event)"
        />
    }
</div>
