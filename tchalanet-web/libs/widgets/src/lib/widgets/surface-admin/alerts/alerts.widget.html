<div class="alerts">
  <h2 class="alerts__title">{{ titleKey() | tchLabel }}</h2>

  @if (alerts().length) {
    <ul class="alerts__list">
      @for (alert of alerts(); track alert.id) {
        <li>
          @if (alert.path) {
            <a class="alerts__item alerts__item--{{ alert.severity | lowercase }}" [routerLink]="alert.path">
              <ng-container [ngTemplateOutlet]="alertBody" [ngTemplateOutletContext]="{ alert: alert }" />
            </a>
          } @else {
            <div class="alerts__item alerts__item--{{ alert.severity | lowercase }}">
              <ng-container [ngTemplateOutlet]="alertBody" [ngTemplateOutletContext]="{ alert: alert }" />
            </div>
          }
        </li>
      }
    </ul>
  } @else {
    <p class="alerts__empty">{{ emptyKey() | tchLabel }}</p>
  }
</div>

<ng-template #alertBody let-alert="alert">
  <span class="alerts__severity-bar" aria-hidden="true"></span>
  <div class="alerts__body">
    <span class="alerts__alert-title">{{ alert.title | tchLabel }}</span>
    @if (alert.message) {
      <span class="alerts__message">{{ alert.message }}</span>
    }
  </div>
</ng-template>
