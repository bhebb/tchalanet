<div class="tch-header__row tch-header__row--l1">
    <!-- BRAND + BURGER -->
    <div class="tch-header__brand-slot">
        @if (vm().handset) {
            <button
                    class="tch-header__icon-btn tch-header__icon-btn--burger"
                    type="button"
                    aria-label="Ouvrir le menu"
                    (click)="burgerClick.emit()"
            >
                <mat-icon>menu</mat-icon>
            </button>
        }

        <button
                class="tch-header__brand-btn"
                type="button"
                aria-label="Aller à l'accueil"
                (click)="brandClick.emit()"
        >
            <tchl-brand
                    [brand]="vm().brand"
                    [showName]="!vm().handset" />
        </button>
    </div>

    <!-- NAV au centre (pas en mobile) -->
    <div class="tch-header__nav-slot">
        @if (vm().desktop) {
            <tchl-nav
                    class="tch-header__nav"
                    [items]="vm().navItems"
                    [currentPath]="vm().currentPath"
                    (selectNavItem)="navSelect.emit($event)"
            />
        }
    </div>

    <!-- ACTIONS à droite -->
    <div class="tch-header__actions-slot">
        <!-- CTA: pas mobile, oui tablette/desktop -->
        <div class="tch-header__actions-primary">
            @if (!vm().handset && vm().showCtaInMainRow && vm().ctaLabel && vm().ctaPath) {
                <button
                        class="tch-header__cta-btn"
                        type="button"
                        (click)="navSelect.emit(vm().ctaPath!)"
                >
                    {{ vm().ctaLabel | translate }}
                </button>
            }
        </div>

        <!-- UTILS -->
        <div class="tch-header__actions-utility">
            @if (vm().showSearch) {
                <button
                        type="button"
                        class="tch-header__icon-btn tch-header__icon-btn--search"
                        aria-label="Rechercher"
                        (click)="searchClick.emit()"
                >
                    <mat-icon>search</mat-icon>
                </button>
            }

            @if (!vm().handset && vm().showLangTheme) {
                <tchl-lang-theme-group
                        class="tch-header__ltg"
                        [currentLang]="vm().langState.currentLang"
                        [availableLangs]="vm().langState.availableLangs"
                        [themeMode]="vm().themeMode"
                        [size]="32"
                        [gap]="10"
                        (changeLang)="changeLang.emit($event)"
                        (toggleTheme)="toggleTheme.emit($event)"
                />
            }

            <button
                    class="tch-header__icon-btn tch-header__icon-btn--account"
                    type="button"
                    [attr.aria-label]="vm().accountAriaLabel"
                    (click)="accountClick.emit()"
            >
                <mat-icon>account_circle</mat-icon>
            </button>
        </div>
    </div>
</div>
