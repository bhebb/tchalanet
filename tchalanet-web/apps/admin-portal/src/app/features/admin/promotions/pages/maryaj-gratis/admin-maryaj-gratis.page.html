<tch-admin-page-shell
  title="Maryaj gratis"
  description="Configurez le jeu Maryaj gratuit et son offre d’attribution automatique."
>
  <div actions>
    <button mat-stroked-button [disabled]="store.state() === 'loading' || store.saving()" (click)="store.load()">
      <mat-icon>refresh</mat-icon>
      Recharger
    </button>
  </div>

  @if (store.state() === 'loading') {
    <tch-loading label="Chargement des promotions..." />
  } @else if (store.state() === 'error') {
    <tch-error-panel [title]="store.error()!" [showRetry]="true" retryLabel="Réessayer" (retry)="store.load()" />
  } @else {
    <tch-admin-detail-layout class="maryaj-page__layout">
      <div main>
        <div class="maryaj-page__stack">
          <tch-maryaj-game-settings-panel
            [game]="store.maryajGame()"
            (configure)="openGameSettings($event)"
          />
          <tch-maryaj-offer-panel
            [campaign]="store.maryajCampaign() ?? null"
            [effect]="store.maryajEffect()"
            [form]="store.form"
            [saving]="store.saving()"
            [gameReady]="store.isMaryajGameReady()"
            [editing]="store.editingOffer()"
            (activateCampaign)="store.activate($event)"
            (pauseCampaign)="store.pause($event)"
            (instantiateOffer)="store.instantiate()"
            (editOffer)="store.startEditingOffer()"
            (cancelEdit)="store.cancelEditingOffer()"
            (saveOffer)="store.saveOffer()"
            (addQuantityTier)="store.addQuantityTier()"
            (removeQuantityTier)="store.removeQuantityTier($event)"
          />
        </div>
      </div>

      <div aside>
        <tch-maryaj-config-summary
          [gameReady]="store.isMaryajGameReady()"
          [campaign]="store.maryajCampaign() ?? null"
          [effect]="store.maryajEffect()"
          [form]="store.form"
          [editing]="store.editingOffer()"
          [regenerableLabel]="regenerableLabel()"
        />
      </div>
    </tch-admin-detail-layout>
  }
</tch-admin-page-shell>
