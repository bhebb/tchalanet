<tch-admin-page-shell title="Grille de cotes" description="Cotes par défaut pour tous les types de mises.">
  <div actions>
    <button mat-stroked-button [disabled]="loading()" (click)="load()">
      <span class="material-symbols-outlined">refresh</span>
      Rafraîchir
    </button>
  </div>

  @if (loading()) {
    <tch-loading label="Chargement..." />
  } @else if (error(); as errorVm) {
    <tch-error-panel
      [title]="errorVm.title"
      [message]="errorVm.message"
      [showRetry]="true"
      retryLabel="Réessayer"
      (retry)="load()"
    />
  } @else if (odds().length === 0) {
    <tch-admin-empty-state icon="casino" title="Aucune cote configurée" message="La grille de cotes est vide." />
  } @else {
    <div class="pricing-page__table">
      <table mat-table [dataSource]="odds()">
        <ng-container matColumnDef="gameCode">
          <th mat-header-cell *matHeaderCellDef>Jeu</th>
          <td mat-cell *matCellDef="let row">{{ row.gameCode }}</td>
        </ng-container>

        <ng-container matColumnDef="betType">
          <th mat-header-cell *matHeaderCellDef>Type de mise</th>
          <td mat-cell *matCellDef="let row">{{ row.betType }}</td>
        </ng-container>

        <ng-container matColumnDef="betOption">
          <th mat-header-cell *matHeaderCellDef>Option</th>
          <td mat-cell *matCellDef="let row">{{ row.betOption }}</td>
        </ng-container>

        <ng-container matColumnDef="odds">
          <th mat-header-cell *matHeaderCellDef>Cote</th>
          <td mat-cell *matCellDef="let row">
            <span class="pricing-page__odds">×{{ row.odds }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="active">
          <th mat-header-cell *matHeaderCellDef>Statut</th>
          <td mat-cell *matCellDef="let row">
            <tch-admin-status-pill
              [label]="row.active ? 'Actif' : 'Inactif'"
              [tone]="activeTone(row.active)"
            />
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns"></tr>
      </table>
    </div>
  }
</tch-admin-page-shell>
