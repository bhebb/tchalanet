<h2 mat-dialog-title>Assigner à un tenant</h2>

<mat-dialog-content>
  <tch-search-select
    label="Rechercher un tenant"
    placeholder="Nom ou code du tenant..."
    icon="apartment"
    emptyLabel="Aucun tenant actif trouvé"
    [searchFn]="searchTenants"
    (valueChange)="select($event)"
  />
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Annuler</button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    [disabled]="!selected()"
    (click)="confirm()"
  >
    Assigner
  </button>
</mat-dialog-actions>
