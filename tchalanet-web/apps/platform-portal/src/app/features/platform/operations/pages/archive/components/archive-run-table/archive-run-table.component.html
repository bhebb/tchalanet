<table mat-table [dataSource]="runs" multiTemplateDataRows class="archive-run-table">
  <ng-container matColumnDef="startedAt">
    <th mat-header-cell *matHeaderCellDef>Date</th>
    <td mat-cell *matCellDef="let row" class="archive-run-table__date">
      {{ row.startedAt | date:'dd/MM/yy HH:mm' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Statut</th>
    <td mat-cell *matCellDef="let row">
      <tch-admin-status-pill [tone]="statusTone(row.status)" [label]="row.status" />
    </td>
  </ng-container>

  <ng-container matColumnDef="strategy">
    <th mat-header-cell *matHeaderCellDef>Stratégie</th>
    <td mat-cell *matCellDef="let row"><code class="archive-run-table__code">{{ row.strategy }}</code></td>
  </ng-container>

  <ng-container matColumnDef="triggerType">
    <th mat-header-cell *matHeaderCellDef>Déclencheur</th>
    <td mat-cell *matCellDef="let row" class="archive-run-table__secondary">{{ row.triggerType }}</td>
  </ng-container>

  <ng-container matColumnDef="duration">
    <th mat-header-cell *matHeaderCellDef>Durée</th>
    <td mat-cell *matCellDef="let row" class="archive-run-table__secondary">{{ duration(row) }}</td>
  </ng-container>

  <ng-container matColumnDef="error">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let row" class="archive-run-table__expand">
      @if (row.errorMessage) {
        <button mat-icon-button (click)="toggleExpand(row.id)"
          [matTooltip]="expandedId === row.id ? 'Masquer erreur' : 'Voir erreur'">
          <span class="material-symbols-outlined">
            {{ expandedId === row.id ? 'expand_less' : 'expand_more' }}
          </span>
        </button>
      }
    </td>
  </ng-container>

  <ng-container matColumnDef="expandedDetail">
    <td mat-cell *matCellDef="let row" [attr.colspan]="runColumns.length" class="archive-run-table__detail-cell">
      @if (expandedId === row.id && row.errorMessage) {
        <div class="archive-run-table__detail archive-run-table__detail--error">
          <span class="material-symbols-outlined">error</span>
          {{ row.errorMessage }}
        </div>
      }
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="runColumns; sticky: true"></tr>
  <tr mat-row *matRowDef="let row; columns: runColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="archive-run-table__detail-row"></tr>
</table>
