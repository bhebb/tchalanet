<tch-admin-page-shell title="Jeux catalogue" description="Référentiel global des jeux disponibles sur la plateforme.">
  <div actions>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <span class="material-symbols-outlined">add</span>
      Nouveau jeu
    </button>
  </div>

  <tch-admin-crud-shell>
    <div toolbar>
      <tch-admin-data-toolbar
        searchPlaceholder="Rechercher un jeu..."
        [searchValue]="search()"
        (searchChange)="onSearch($event)"
      >
        <button mat-stroked-button (click)="load()">
          <span class="material-symbols-outlined">refresh</span>
        </button>
      </tch-admin-data-toolbar>
    </div>

    <div content>
      @if (loading()) {
        <tch-loading label="Chargement..." />
      } @else if (error()) {
        <tch-error-panel [title]="error()!" [showRetry]="true" retryLabel="Réessayer" (retry)="load()" />
      } @else if (games().length === 0) {
        <tch-admin-empty-state icon="casino" title="Aucun jeu" message="Créez le premier jeu du catalogue." />
      } @else {
        <table mat-table [dataSource]="games()">
          <ng-container matColumnDef="code">
            <th mat-header-cell *matHeaderCellDef>Code</th>
            <td mat-cell *matCellDef="let row"><code>{{ row.code }}</code></td>
          </ng-container>
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nom</th>
            <td mat-cell *matCellDef="let row">{{ row.name }}</td>
          </ng-container>
          <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef>Catégorie</th>
            <td mat-cell *matCellDef="let row">{{ row.category ?? '—' }}</td>
          </ng-container>
          <ng-container matColumnDef="sortOrder">
            <th mat-header-cell *matHeaderCellDef>Ordre</th>
            <td mat-cell *matCellDef="let row">{{ row.sortOrder }}</td>
          </ng-container>
          <ng-container matColumnDef="active">
            <th mat-header-cell *matHeaderCellDef>Statut</th>
            <td mat-cell *matCellDef="let row">
              <tch-admin-status-pill [tone]="row.active ? 'success' : 'neutral'" [label]="row.active ? 'Actif' : 'Inactif'" />
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let row">
              <button mat-icon-button title="Modifier" (click)="openEdit(row)">
                <span class="material-symbols-outlined">edit</span>
              </button>
              @if (row.active) {
                <button mat-icon-button title="Désactiver" (click)="deactivate(row)">
                  <span class="material-symbols-outlined">block</span>
                </button>
              }
              <button mat-icon-button color="warn" title="Supprimer" (click)="delete(row)">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      }
    </div>

    <div footer>
      <span>{{ totalElements() }} jeu(x)</span>
      <div style="display:flex;align-items:center;gap:4px">
        <button mat-icon-button [disabled]="!hasPrevious()" (click)="prevPage()">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <span>Page {{ page() + 1 }} / {{ totalPages() }}</span>
        <button mat-icon-button [disabled]="!hasNext()" (click)="nextPage()">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
    </div>
  </tch-admin-crud-shell>
</tch-admin-page-shell>
