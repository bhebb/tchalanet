<tch-admin-page-shell
  [title]="cardUser()?.displayName || cardUser()?.email || 'Super admin'"
  description="Détail du compte super administrateur."
>
  <div actions>
    <button mat-stroked-button type="button" (click)="goBack()">
      <span class="material-symbols-outlined">arrow_back</span>
      Retour
    </button>
  </div>

  @if (loading()) {
    <tch-loading label="Chargement..." />
  } @else if (error(); as errorVm) {
    <tch-error-panel [title]="errorVm.title" [message]="errorVm.message" />
  } @else if (cardUser(); as u) {
    @if (actionNotice(); as notice) {
      <tch-section-error
        class="platform-admin-user-detail__notice"
        [title]="notice.title"
        [message]="notice.message"
        severity="info"
      />
    }

    <tch-platform-admin-user-card
      [user]="u"
      (activate)="activate()"
      (block)="block()"
      (archive)="archive()"
      (resetPassword)="resetPassword()"
      (assignTenant)="assignTenant()"
    />
  }
</tch-admin-page-shell>
