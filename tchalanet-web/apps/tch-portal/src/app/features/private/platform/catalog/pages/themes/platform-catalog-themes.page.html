<tch-admin-page-shell title="Thèmes" description="Référentiel global des thèmes visuels de la plateforme.">
  <div actions>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <span class="material-symbols-outlined">add</span>
      Nouveau thème
    </button>
  </div>

  <tch-admin-crud-shell>
    <div toolbar>
      <tch-admin-data-toolbar searchPlaceholder="Rechercher..." [searchValue]="''" (searchChange)="load()">
        <button mat-stroked-button (click)="load()">
          <span class="material-symbols-outlined">refresh</span>
        </button>
      </tch-admin-data-toolbar>
    </div>

    <div content>
      @if (loading()) {
        <tch-loading label="Chargement..." />
      } @else if (error()) {
        <tch-error-panel [title]="error()!" [showRetry]="true" retryLabel="Réessayer" (retry)="load()" />
      } @else if (themes().length === 0) {
        <tch-admin-empty-state icon="palette" title="Aucun thème" message="Créez le premier thème visuel." />
      } @else {
        <table mat-table [dataSource]="themes()">
          <ng-container matColumnDef="code">
            <th mat-header-cell *matHeaderCellDef>Code</th>
            <td mat-cell *matCellDef="let row"><code>{{ row.code }}</code></td>
          </ng-container>
          <ng-container matColumnDef="vendor">
            <th mat-header-cell *matHeaderCellDef>Vendeur</th>
            <td mat-cell *matCellDef="let row">{{ row.vendor ?? '—' }}</td>
          </ng-container>
          <ng-container matColumnDef="labelKey">
            <th mat-header-cell *matHeaderCellDef>Clé libellé</th>
            <td mat-cell *matCellDef="let row">{{ row.labelKey ?? '—' }}</td>
          </ng-container>
          <ng-container matColumnDef="active">
            <th mat-header-cell *matHeaderCellDef>Statut</th>
            <td mat-cell *matCellDef="let row">
              <tch-admin-status-pill [tone]="row.active ? 'success' : 'neutral'" [label]="row.active ? 'Actif' : 'Inactif'" />
            </td>
          </ng-container>
          <ng-container matColumnDef="isDefault">
            <th mat-header-cell *matHeaderCellDef>Défaut</th>
            <td mat-cell *matCellDef="let row">
              @if (row.isDefault) {
                <span class="material-symbols-outlined" style="color:var(--tch-success)">star</span>
              }
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let row">
              <button mat-icon-button title="Modifier" (click)="openEdit(row)">
                <span class="material-symbols-outlined">edit</span>
              </button>
              <button mat-icon-button color="warn" title="Supprimer" (click)="delete(row)">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      }
    </div>

    <div footer>
      <span>{{ themes().length }} thème(s)</span>
    </div>
  </tch-admin-crud-shell>
</tch-admin-page-shell>
