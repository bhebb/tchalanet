<div class="archive-summary-bar">
  <div class="archive-summary-bar__stat archive-summary-bar__stat--success">
    <span class="material-symbols-outlined">check_circle</span>
    <span>{{ summary.completedRuns }} complétés</span>
  </div>
  <div class="archive-summary-bar__stat archive-summary-bar__stat--warn">
    <span class="material-symbols-outlined">pending</span>
    <span>{{ summary.startedRuns }} en cours</span>
  </div>
  <div class="archive-summary-bar__stat" [class.archive-summary-bar__stat--danger]="summary.failedRuns > 0">
    <span class="material-symbols-outlined">error</span>
    <span>{{ summary.failedRuns }} échoués</span>
  </div>
  <div class="archive-summary-bar__separator"></div>
  <div class="archive-summary-bar__stat archive-summary-bar__stat--success">
    <span class="material-symbols-outlined">verified</span>
    <span>{{ summary.verifiedObjects }} vérifiés</span>
  </div>
  <div class="archive-summary-bar__stat">
    <span class="material-symbols-outlined">hourglass_empty</span>
    <span>{{ summary.pendingObjects }} en attente</span>
  </div>
  <div class="archive-summary-bar__stat" [class.archive-summary-bar__stat--danger]="summary.invalidObjects > 0">
    <span class="material-symbols-outlined">report</span>
    <span>{{ summary.invalidObjects }} invalides</span>
  </div>

  <div class="archive-summary-bar__separator"></div>

  <button mat-stroked-button [class.archive-summary-bar__view--active]="isRunsActive()" (click)="viewSelected.emit('recent')">
    Runs récents
  </button>
  <button mat-stroked-button [class.archive-summary-bar__view--active]="activeView === 'failed'" (click)="viewSelected.emit('failed')">
    Runs échoués
  </button>
  <button mat-stroked-button [class.archive-summary-bar__view--active]="activeView === 'invalid'" (click)="viewSelected.emit('invalid')">
    Objets invalides
  </button>
  <button mat-stroked-button [class.archive-summary-bar__view--active]="activeView === 'legal-holds'" (click)="viewSelected.emit('legal-holds')">
    Rétentions légales
  </button>
  <button mat-stroked-button [class.archive-summary-bar__view--active]="activeView === 'partitions'" (click)="viewSelected.emit('partitions')">
    Partitions
  </button>
  <button mat-stroked-button [class.archive-summary-bar__view--active]="activeView === 'purges'" (click)="viewSelected.emit('purges')">
    Purges
  </button>
</div>
