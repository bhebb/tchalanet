<h2 mat-dialog-title>Assigner un administrateur existant</h2>

<mat-dialog-content>
  <tch-search-select
    label="Rechercher un utilisateur sans tenant"
    placeholder="Nom ou email..."
    icon="person"
    emptyLabel="Aucun utilisateur sans affectation trouvé"
    [searchFn]="searchUsers"
    (valueChange)="select($event)"
  />
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Annuler</button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    [disabled]="!selected()"
    (click)="confirm()"
  >
    Assigner
  </button>
</mat-dialog-actions>
