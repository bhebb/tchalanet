<tch-private-shell-layout
  [brand]="brand()"
  [titleKey]="titleKey()"
  [primary]="primary()"
  [sections]="shellSvc.navigation()"
  [secondary]="shell()?.navigationDrawer?.secondary ?? []"
  [userName]="userName()"
  [darkMode]="isDark()"
  [feedbackVerbosity]="feedbackVerbosity()"
  [(drawerOpen)]="drawerOpen"
  (themeToggled)="toggleMode()"
  (profileRequested)="openProfile()"
  (settingsRequested)="comingSoon()"
  (logoutRequested)="logout()"
>
  <tch-private-notification-bell private-shell-utility />
  <tch-language-switcher private-shell-utility />
  <tch-admin-override-banner private-shell-before-content />
  <router-outlet />
</tch-private-shell-layout>
