@let vm = state();
@switch (vm.status) {
    @case ('loading') {
        <tch-loading [label]="'common.loading' | translate"/>
    }
    @case ('error') {
        <tch-error-panel
                [title]="'common.error.title' | translate"
                [message]="'dashboard.loadError' | translate"
        />
    }
    @case ('ready') {
        <tch-page-model [content]="vm.response.content" [dynamic]="vm.response.dynamic"/>
    }
}
