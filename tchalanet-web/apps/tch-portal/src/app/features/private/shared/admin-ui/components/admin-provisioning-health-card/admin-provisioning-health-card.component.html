<article class="admin-provisioning-health-card">
  <header class="admin-provisioning-health-card__header">
    <div>
      <p class="admin-provisioning-health-card__eyebrow">{{ eyebrow() }}</p>
      <h2 class="admin-provisioning-health-card__title">{{ title() }}</h2>
    </div>
    <tch-admin-status-pill [label]="readinessLabel()" [tone]="readinessTone()" />
  </header>

  @if (progressValue() !== null) {
    <div
      class="admin-provisioning-health-card__progress"
      role="progressbar"
      [attr.aria-valuenow]="progressValue()"
      aria-valuemin="0"
      aria-valuemax="100"
    >
      <span [style.width.%]="progressValue()"></span>
    </div>
  }

  @if (loading()) {
    <tch-loading [label]="loadingLabel()" />
  } @else if (error()) {
    <tch-error-panel [title]="error()!" />
  } @else if (items().length) {
    <dl class="admin-provisioning-health-card__items">
      @for (item of visibleItems(); track item.label) {
        <div class="admin-provisioning-health-card__item">
          <dt>{{ item.label }}</dt>
          <dd>
            <tch-admin-status-pill [label]="item.status" [tone]="item.tone" />
          </dd>
        </div>
      }
    </dl>
    @if (hiddenCount() > 0) {
      <button
        type="button"
        class="admin-provisioning-health-card__toggle"
        [attr.aria-expanded]="expanded()"
        (click)="toggle()"
      >
        {{ expanded() ? showLessLabel() : showAllLabel() + ' (+' + hiddenCount() + ')' }}
      </button>
    }
  } @else {
    <p class="admin-provisioning-health-card__empty">{{ emptyLabel() }}</p>
  }
</article>
