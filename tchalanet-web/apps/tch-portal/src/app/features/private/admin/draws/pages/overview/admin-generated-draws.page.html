<tch-admin-page-shell
  title="Tirages générés"
  description="Suivez les tirages générés, leur état de vente et les résultats attendus."
>
  <div actions>
    <button mat-stroked-button [disabled]="pageState() === 'loading'" (click)="load()">
      <span class="material-symbols-outlined">refresh</span>
      Actualiser
    </button>

    <button mat-stroked-button [matMenuTriggerFor]="actionsMenu">
      <span class="material-symbols-outlined">more_vert</span>
      Actions
    </button>
    <mat-menu #actionsMenu="matMenu">
      <!-- TODO(permissions): restrict planNextDraws to support/advanced-admin role -->
      <button mat-menu-item [disabled]="planning()" (click)="onPlanNextDraws()">
        <span class="material-symbols-outlined">event_available</span>
        Planifier les prochains tirages
      </button>
      <button mat-menu-item (click)="onConfigureDrawChannels()">
        <span class="material-symbols-outlined">event_repeat</span>
        Configurer les canaux de tirage
      </button>
    </mat-menu>
  </div>

  @if (pageState() === 'loading') {
    <tch-loading label="Chargement des tirages…" />
  } @else if (pageState() === 'error') {
    <tch-error-panel
      [title]="pageError()!"
      [showRetry]="true"
      retryLabel="Réessayer"
      (retry)="load()"
    />
  } @else {

    <!-- KPI summary -->
    <tch-generated-draws-summary [draws]="allDraws()" [today]="today" />

    <!-- Toolbar -->
    <tch-admin-crud-shell>
      <div toolbar>
        <!-- Date preset chips -->
        <div class="gd-page__date-chips">
          @for (preset of datePresets; track preset.key) {
            <button
              class="gd-page__chip"
              [class.gd-page__chip--active]="datePreset() === preset.key"
              (click)="onDatePreset(preset.key)"
            >{{ preset.label }}</button>
          }
        </div>

        <!-- Status filter -->
        <select class="gd-page__select" [value]="statusFilter()"
          (change)="onStatusFilter($any($event.target).value)">
          @for (f of statusFilters; track f.key) {
            <option [value]="f.key">{{ f.label }}</option>
          }
        </select>
      </div>

      <div toolbar>
        <tch-admin-data-toolbar
          searchPlaceholder="Rechercher provider, slot…"
          [searchValue]="searchQuery()"
          (searchChange)="onSearch($event)"
        />
      </div>

      <!-- Table or empty state -->
      <div content>
        @if (groupedDraws().length === 0) {
          <tch-admin-empty-state
            icon="confirmation_number"
            title="Aucun tirage généré pour cette période."
            message="Ajustez les filtres ou planifiez les prochains tirages."
          >
            <div class="gd-page__empty-actions">
              <button mat-stroked-button (click)="onConfigureDrawChannels()">
                Configurer les canaux de tirage
              </button>
              <button mat-flat-button color="primary" [disabled]="planning()" (click)="onPlanNextDraws()">
                Planifier les prochains tirages
              </button>
            </div>
          </tch-admin-empty-state>
        } @else {
          <tch-generated-draws-table
            [groups]="groupedDraws()"
            [todayDate]="today"
            [totalElements]="totalElements()"
            [page]="page()"
            (enterResult)="onEnterResult($event)"
            (viewResult)="onViewResult($event)"
            (viewDetails)="onViewDetails($event)"
            (verifySource)="onVerifySource($event)"
            (nextPage)="onNextPage()"
            (prevPage)="onPrevPage()"
          />
        }
      </div>
    </tch-admin-crud-shell>

  }
</tch-admin-page-shell>

@if (selectedDraw(); as draw) {
  <tch-draw-result-drawer
    [draw]="draw"
    (closed)="onDrawerClosed()"
    (resultSaved)="onResultSaved($event)"
  />
}
