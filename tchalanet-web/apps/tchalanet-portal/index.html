<!DOCTYPE html>
<html lang="fr" data-theme="tchalanet">
<head>
    <meta charset="utf-8"/>
    <title>tchalanet-web</title>
    <base href="/"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1" rel="stylesheet">
    <!-- Material Symbols Outlined -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        /* make all <mat-icon> use Material Symbols Outlined by default */
        .mat-icon, .material-symbols-outlined {
            font-family: "Material Symbols Outlined";
            font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
            line-height: 1;
        }
    </style>
    <!-- Load Vite client + application entry (module) -->
    <script type="module" src="/@vite/client"></script>
    <script type="module" src="/src/main.ts"></script>
</head>
<body class="tch-theme" id="theme-root">
    <tch-root></tch-root>
</body>
</html>
