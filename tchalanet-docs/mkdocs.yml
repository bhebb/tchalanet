site_name: Tchalanet Docs
not_in_nav: |
  01-architecture/page-model.md
  01-architecture/flows/**
  02-features/**
  02-functional/**
  03-adr/index.md
  03-adr/offline_sales_risk_matrix.html
  99-reference/docs-inventory.md
  99-reference/docs-duplicates.md
  99-reference/docs-cleanup-plan.md
  99-reference/ai-agent-files-inventory.md
  99-reference/ai-agent-duplicates.md
  99-reference/ai-agent-cleanup-plan.md
  99-links/**
  server-docs/**
  mobile-docs/**
  07-design-system/**
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Accueil: index.md

  - Overview:
      - Product: 00-overview/product.md
      - Architecture map: 00-overview/architecture-map.md
      - Glossary: 00-overview/glossary.md

  - Guidelines:
      - Vue d'ensemble: 00-guidelines/index.md
      - Constitution: 00-guidelines/constitution.md
      - IA Policy: 00-guidelines/ai-policy.md
      - Doc Policy: 00-guidelines/doc-policy.md
      - Glossaire: 00-guidelines/glossary.md
      - Versions: 00-guidelines/versions.md

  - Architecture:
      - Index: 01-architecture/index.md
      - System overview: 01-architecture/system-overview.md
      - Security model: 01-architecture/security-model.md
      - Backend map: 01-architecture/backend-map.md
      - Backend architecture: server-docs/ARCHITECTURE.md
      - Frontend map: 01-architecture/frontend-map.md
      - Infra map: 01-architecture/infra-map.md

  - Conventions:
      - Backend:
          - Clean Architecture: server-docs/conventions/clean_architecture.md
          - Bus & Handlers: server-docs/conventions/bus.md
          - Command/Query: server-docs/conventions/command_query_handlers.md
          - Inter-Domain: server-docs/conventions/inter_domain_calls.md
          - Event Model: server-docs/conventions/event_model.md
          - Typed IDs: server-docs/conventions/typed_ids.md
          - Idempotency: server-docs/conventions/idempotency.md
          - Persistence: server-docs/conventions/persistence/persistence.md
          - RLS: server-docs/conventions/persistence/rls.md
          - API: server-docs/conventions/api/web_api.md
          - Context: server-docs/conventions/context/request-context.md
          - Security: server-docs/conventions/security_permissions.md
          - Testing: server-docs/conventions/testing.md
          - Cache: server-docs/conventions/cache.md
          - Timezone: server-docs/conventions/timezone.md
      - Backend Playbook: server-docs/PLAYBOOK.md
      - Mobile:
          - Architecture: mobile-docs/ARCHITECTURE.md
          - Playbook: mobile-docs/PLAYBOOK.md
          - UI Rules: mobile-docs/mobile/ui-rules.md

  - Flows:
      - Index: 02-functional/flows/index.md
      - Admin POS selection: 02-functional/flows/admin-pos-selection.md
      - Draw execution: 02-functional/flows/draw-execution.md
      - Offline sync: 02-functional/flows/offline-sync.md
      - Payout: 02-functional/flows/payout-field-flow.md
      - Reconciliation: 02-functional/flows/reconciliation.md
      - Sell ticket: 02-functional/flows/sell-ticket.md
      - Seller onboarding: 02-functional/flows/seller-onboarding.md
      - Session opening: 02-functional/flows/session-opening.md
      - Settlement: 02-functional/flows/settlement.md
      - Tenant onboarding: 02-functional/flows/tenant-onboarding.md
      - Terminal binding: 02-functional/flows/terminal-binding.md
      - Verify ticket: 02-functional/flows/verify-ticket.md

  - Operations:
      - Index: 04-operations/index.md

  - ADR:
      - Offline Sales Risk Policy: 03-adr/ADR-offline-sales-risk-policy.md

  - OpenSpec:
      - Index: 06-openspec/index.md
      - Active changes: 06-openspec/active-changes.md
      - Context packs: 06-openspec/context-packs.md
      - Archive policy: 06-openspec/archive-policy.md

  - Reference:
      - Index: 99-reference/index.md
      - Component AGENTS map: 99-reference/component-agents-map.md
      - AI context loading: 99-reference/ai-context-loading.md
