site_name: Tchalanet Docs
not_in_nav: |
  00-audit/**
  01-architecture/page-model.md
  01-architecture/flows/**
  02-features/**
  02-functional/domains/**/*.md
  03-adr/index.md
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Accueil: index.md

  - Overview:
      - Product: 00-overview/product.md
      - Architecture map: 00-overview/architecture-map.md
      - Glossary: 00-overview/glossary.md

  - Guidelines:
      - Vue d'ensemble: 00-guidelines/index.md
      - Constitution: 00-guidelines/constitution.md
      - IA Policy: 00-guidelines/ai-policy.md
      - Doc Policy: 00-guidelines/doc-policy.md
      - Glossaire: 00-guidelines/glossary.md
      - Versions: 00-guidelines/versions.md

  - Architecture:
      - Index: 01-architecture/index.md
      - System overview: 01-architecture/system-overview.md
      - Security model: 01-architecture/security-model.md
      - Backend map: 01-architecture/backend-map.md
      - Frontend map: 01-architecture/frontend-map.md
      - Infra map: 01-architecture/infra-map.md

  - Métier:
      - Index: 02-functional/index.md
      - Domains portal: 02-domains/index.md
      - Domain index: 02-functional/domains/index.md
      - Flows:
          - Index: 02-functional/flows/index.md
          - Sell ticket: 02-functional/flows/sell-ticket.md
          - Verify ticket: 02-functional/flows/verify-ticket.md
          - Draw execution: 02-functional/flows/draw-execution.md
      - Features:
          - Index: 02-functional/features/index.md
          - PageModel: 02-functional/features/pagemodel.md
          - PublicDraw: 02-functional/features/publicdraw.md
          - News: 02-functional/features/news.md
          - PrivateDashboard: 02-functional/features/privatedashboard.md
          - PublicHome: 02-functional/features/publichome.md
          - Stats: 02-functional/features/stats.md
          - i18n: 02-functional/features/i18n.md
          - Notifications: 02-functional/features/notifications.md
          - Reporting: 02-functional/features/reporting.md

  - Applications:
      - Index: 03-apps/index.md
      - Server: 03-apps/server.md
      - Web: 03-apps/web.md
      - Mobile: 03-apps/mobile.md
      - Edge: 03-apps/edge.md
      - Infra: 03-apps/infra.md

  - Operations:
      - Index: 04-operations/index.md

  - Decisions:
      - Index: 05-decisions/index.md
      - ADR Index: 05-decisions/adr-index.md

  - OpenSpec:
      - Index: 06-openspec/index.md
      - Active changes: 06-openspec/active-changes.md
      - Context packs: 06-openspec/context-packs.md
      - Archive policy: 06-openspec/archive-policy.md

  - Reference:
      - Index: 99-reference/index.md
      - Docs inventory: 99-reference/docs-inventory.md
      - Duplicate report: 99-reference/docs-duplicates.md
      - Cleanup plan: 99-reference/docs-cleanup-plan.md
      - AI agent inventory: 99-reference/ai-agent-files-inventory.md
      - AI duplicate report: 99-reference/ai-agent-duplicates.md
      - AI cleanup plan: 99-reference/ai-agent-cleanup-plan.md
      - Component AGENTS map: 99-reference/component-agents-map.md
      - AI context loading: 99-reference/ai-context-loading.md
      - Root AGENTS simplification: 99-reference/root-agents-simplification-proposal.md
      - MkDocs nav plan: 99-reference/mkdocs-nav-plan.md
      - Component docs: 99-reference/links-to-component-docs.md

  - Liens:
      - Index: 99-links/index.md
      - Backend: 99-links/backend.md
      - Web: 99-links/web.md
      - Mobile: 99-links/mobile.md
      - Infra: 99-links/infra.md
      - Edge: 99-links/edge.md
      - OpenSpec: 99-links/openspec.md
