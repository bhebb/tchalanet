site_name: Tchalanet Docs
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Accueil: index.md

  - Guidelines:
      - Vue d'ensemble: 00-guidelines/index.md
      - Constitution: 00-guidelines/constitution.md
      - IA Policy: 00-guidelines/ai-policy.md
      - Doc Policy: 00-guidelines/doc-policy.md
      - Glossaire: 00-guidelines/glossary.md
      - Versions: 00-guidelines/versions.md

  - Architecture:
      - Index: 01-architecture/index.md
      - System overview: 01-architecture/system-overview.md
      - Security model: 01-architecture/security-model.md
      - Backend map: 01-architecture/backend-map.md
      - Frontend map: 01-architecture/frontend-map.md
      - Infra map: 01-architecture/infra-map.md

  - Métier:
      - Index: 02-functional/index.md
      - Domaines:
          - Index: 02-functional/domains/index.md
          - Access control: 02-functional/domains/accesscontrol.md
          - Address: 02-functional/domains/address.md
          - Audit: 02-functional/domains/audit.md
          - Autonomy: 02-functional/domains/autonomy.md
          - Catalog: 02-functional/domains/catalog.md
          - Draw: 02-functional/domains/draw.md
          - DrawResult (Catalog): 02-functional/domains/drawresult.md
          - External: 02-functional/domains/external.md
          - FeatureFlags: 02-functional/domains/featureflags.md
          - Game (Catalog): 02-functional/domains/game.md
          - Haiti: 02-functional/domains/haiti.md
          - Ledger: 02-functional/domains/ledger.md
          - Limits: 02-functional/domains/limits.md
          - Notification: 02-functional/domains/notification.md
          - OfflineSync: 02-functional/domains/offlinesync.md
          - Outlet: 02-functional/domains/outlet.md
          - POS: 02-functional/domains/pos.md
          - Pricing (Catalog): 02-functional/domains/pricing.md
          - Payout: 02-functional/domains/payout.md
          - ResultSlot (Catalog): 02-functional/domains/resultslot.md
          - Sales: 02-functional/domains/sales.md
          - Session: 02-functional/domains/session.md
          - Settings: 02-functional/domains/settings.md
          - Tenant: 02-functional/domains/tenant.md
          - Theme: 02-functional/domains/theme.md
          - US Lottery: 02-functional/domains/uslottery.md
          - User: 02-functional/domains/user.md
      - Flows:
          - Index: 02-functional/flows/index.md
          - Sell ticket: 02-functional/flows/sell-ticket.md
          - Verify ticket: 02-functional/flows/verify-ticket.md
          - Draw execution: 02-functional/flows/draw-execution.md
          - Claim payout: 02-functional/flows/claim-payout.md
      - Features:
          - Index: docs/02-functional/features/index.md
          - PageModel: docs/02-functional/features/pagemodel.md
          - PublicDraw: docs/02-functional/features/publicdraw.md
          - News: docs/02-functional/features/news.md
          - PrivateDashboard: docs/02-functional/features/privatedashboard.md
          - PublicHome: docs/02-functional/features/publichome.md
          - Stats: docs/02-functional/features/stats.md
          - i18n: docs/02-functional/features/i18n.md
          - Notifications: docs/02-functional/features/notifications.md
          - Reporting: docs/02-functional/features/reporting.md

  - ADR:
