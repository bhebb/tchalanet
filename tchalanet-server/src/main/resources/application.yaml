# ===========================
# APPLICATION PROPERTIES
# ===========================
app:
  version: ${APP_VERSION:0.1.0}
  api-version: ${API_VERSION:v1}
  base-path: ${APP_BASE_PATH:/api}
  api-base-url: ${APP_API_BASEURL:http://localhost:8083}
  auth-url: ${TCH_KC_ISSUER}
  default-tenant: ${APP_DEFAULT_TENANT:tchalanet}
  cors:
    # use a comma-separated env var (APP_CORS_ALLOWED_ORIGINS) which Spring will bind to a List<String>
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://app.localtest.me}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,Accept,Origin
    exposed-headers: Location
    allow-credentials: true
  security:
    required-audience: tchalanet-api
    user-bootstrap:
      enabled: true
      update-last-login: true
  # default ZoneId used by the application; can be overridden with env var APP_ZONE_ID
  zone-id: ${APP_ZONE_ID:UTC}

kc:
  bootstrap:
    enabled: true
    base-url: ${KC_BASE_URL:https://auth.localtest.me}
    target-realm: ${KC_TARGET_REALM:tchalanet}
    admin-realm: ${KC_ADMIN_REALM:master}
    admin-username: ${KC_ADMIN_USERNAME:admin}
    admin-password: ${KC_ADMIN_PASSWORD:admin}
    admin-password-file: ${KC_ADMIN_PASSWORD_FILE:}
    users:
      - super_admin
      - admin
      - agent
# ===========================
# SPRING FRAMEWORK
# ===========================
spring:
  # Exclude Redis autoconfiguration by default - enable only when tch.cache.redis.enabled=true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  config:
    import:
      - optional:classpath:application-draw.yaml
      - optional:classpath:application-uslottery.yaml

  # --- servlet path: ensure all MVC and Spring Data REST endpoints are prefixed with /api/v1 ---
  mvc:
    servlet:
      path: ${app.base-path}/${app.api-version}

  # global web security debug flag (default false)
  websecurity:
    debug: false

  # --- Datasource & JPA ---
  datasource:
    hikari:
      maximum-pool-size: 10
      jdbc-url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/tchalanet_db}
      username: ${SPRING_DATASOURCE_USERNAME:app_user}
      password: ${SPRING_DATASOURCE_PASSWORD:devpass}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      org.hibernate.envers.audit_table_suffix: "_aud"
      org.hibernate.envers.store_data_at_delete: true
      org.hibernate.envers.revision_field_name: "rev"
      org.hibernate.envers.revision_type_field_name: "revtype"
      org.hibernate.envers.revision_listener: "com.tchalanet.server.core.audit.infra.persistence.envers.TchRevisionListener"

      hibernate.type.json_format_mapper: jackson3
  batch:
    jdbc:
      initialize-schema: never   # on laisse Flyway créer les tables
    job:
      enabled: false             # pas de job auto au démarrage (on les lance via API / schedulers)

  # --- Database Migration ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public,batch


  # --- Security (OAuth2 Resource Server) ---
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/tchalanet

  # --- Redis Cache ---
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000
      repositories:
        enabled: false
    rest:
      enabled: true
      base-path: /_sdr
      detection-strategy: annotated



tch:
  cache:
    redis:
      enabled: false

  # Rate-limiting for public ticket endpoints (/public/tickets/**)
  public:
    tickets:
      rate-limit:
        enabled: true
        requests-per-second: 10
        burst: 30

  tickets:
    public:
      base-url: ${TCH_TICKET_PUBLIC_BASE_URL:https://app.tchalanet.com}
      ticket-path-template: ${TCH_TICKET_PATH_TEMPLATE:/ticket/{code}}

  communication:
    edge:
      enabled: true
      base-url: "http://localhost:3000"  # Local development
      # base-url: "http://tchalanet-edge-service:3000"  # Docker deployment
      messages-path: "/internal/messages/send"
      hmac-secret: "${EDGE_INTERNAL_HMAC_SECRET}"
      connect-timeout: 2s
      read-timeout: 5s

  # News provider / cache configuration
  news:
    provider:
      url: ${TCH_NEWS_FEED:https://lotterydaily.com/feed/}
      apiKey: ""
    cache:
      key: ${TCH_NEWS_CACHE_KEY:tch:public:news}
      cacheName: ${TCH_NEWS_CACHE_NAME:news-latest}
    ttl:
      hours: ${TCH_NEWS_TTL_HOURS:24}
    refresh:
      cron: ${TCH_NEWS_REFRESH_CRON:0 0 */6 * * *}


# ===========================
# API DOCUMENTATION
# ===========================
springdoc:
  api-docs:
    path: /openapi
    enabled: true
  swagger-ui:
    path: /swagger-ui
    display-operation-id: true
    try-it-out-enabled: true
    filter: true
    oauth:
      client-id: ${SWAGGER_CLIENT_ID:tchalanet-swagger}
      use-pkce-with-authorization-code-grant: true
    oauth2-redirect-url: https://auth.localtest.me/swagger-ui/oauth2-redirect.html

# ===========================
# LOGGING
# ===========================
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.tchalanet.server: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.security.oauth2.jwt: INFO
    org.springframework.security.oauth2.server.resource: INFO
    org.hibernate.SQL: INFO


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,scheduledtasks,loggers,threaddump,env,beans
  # Notification flow configuration
  flows:
    draw-lifecycle:
      enabled: true
      slack-info-enabled: false  # Quiet by default
      email-enabled: false
    draw-results:
      enabled: true
      slack-enabled: true
      email-detail-enabled: true  # Dev/debug detail
      watched-providers:
        - NY
        - FL
      watched-slots:
        - NY_MID
        - NY_EVE
        - FL_MID
        - FL_EVE
    apply:
      enabled: true
      slack-info-enabled: false
      email-on-warning-enabled: true
      email-on-failure-enabled: true
    settlement:
      enabled: true
      slack-info-enabled: false
      email-admin-enabled: false
    sales-reports:
      enabled: false
      daily-email-enabled: false
    client-delivery:
      enabled: false
      ticket-sold-enabled: false
      ticket-won-enabled: false
