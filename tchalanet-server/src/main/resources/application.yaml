# ===========================
# APPLICATION PROPERTIES
# ===========================
app:
  version: ${APP_VERSION:0.1.0}
  api-version: ${API_VERSION:v1}
  base-path: ${APP_BASE_PATH:/api}
  api-base-url: ${APP_API_BASEURL:http://localhost:8083}
  auth-url: ${TCH_KC_ISSUER}
  default-tenant: ${APP_DEFAULT_TENANT:default}
  cors:
    # use a comma-separated env var (APP_CORS_ALLOWED_ORIGINS) which Spring will bind to a List<String>
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://app.localtest.me}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,Accept,Origin
    exposed-headers: Location
    allow-credentials: true
  security:
    required-audience: tchalanet-api

# ===========================
# SPRING FRAMEWORK
# ===========================
spring:
  # --- Datasource & JPA ---
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/tchalanet_db}
    username: ${SPRING_DATASOURCE_USERNAME:app_user}
    password: ${SPRING_DATASOURCE_PASSWORD:devpass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      org.hibernate.envers.audit_table_suffix: "_aud"
      org.hibernate.envers.store_data_at_delete: true
      org.hibernate.envers.revision_field_name: "rev"
      org.hibernate.envers.revision_type_field_name: "revtype"
      org.hibernate.envers.revision_listener: "com.tchalanet.server.common.infra.persistence.audit.TchRevisionListener"

  # --- Database Migration ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # --- Security (OAuth2 Resource Server) ---
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/tchalanet

  # --- Redis Cache ---
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000

  # --- Spring Batch: disable auto-run at startup when multiple jobs are defined ---
  batch:
    job:
      enabled: false

tch:
  # Draw results provider configuration (external provider + fake mode)
  # mode: fake | api | api_then_fake | disabled
  results:
    mode: ${TCH_RESULTS_MODE:api_then_fake}
    # lotteryresults provider configuration
    lotteryresults:
      enabled: ${TCH_RESULTS_LOTTERY_ENABLED:true}
      base-url: ${TCH_RESULTS_LOTTERY_BASEURL:https://api.lotteryresults.example.com}
      api-key: ${LOTTERYRESULTS_API_KEY:}

  # News provider / cache configuration
  news:
    provider:
      url: ${TCH_NEWS_FEED:https://lotterydaily.com/feed/}
      apiKey: ""
    redis:
      key: ${TCH_NEWS_REDIS_KEY:tch:public:news}
    ttl:
      hours: ${TCH_NEWS_TTL_HOURS:24}
    refresh:
      cron: ${TCH_NEWS_REFRESH_CRON:0 0 */6 * * *}

  # Draw generation and cache configuration
  draw:
    results:
      # kept alias to old props for backwards compat with env names
      mode: ${TCH_RESULTS_MODE:api_then_fake}
    generation:
      days: ${DRAW_GENERATION_DAYS:14}
      cron: ${DRAW_GENERATION_CRON:0 5 0 * * *}
    cache:
      ttl:
        last7m: ${DRAW_CACHE_TTL_LAST7M:5}   # minutes
        todaym: ${DRAW_CACHE_TTL_TODAYM:5}   # minutes
        nexts: ${DRAW_CACHE_TTL_NEXTS:60}    # seconds

# ===========================
# API DOCUMENTATION
# ===========================
springdoc:
  api-docs:
    path: /openapi
    enabled: true
  swagger-ui:
    path: /swagger-ui
    display-operation-id: true
    try-it-out-enabled: true
    filter: true
    oauth:
      client-id: ${SWAGGER_CLIENT_ID:tchalanet-swagger}
      use-pkce-with-authorization-code-grant: true
    oauth2-redirect-url: https://auth.localtest.me/swagger-ui/oauth2-redirect.html

# ===========================
# LOGGING
# ===========================
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.tchalanet.server: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
