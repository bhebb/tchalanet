tch:
  draw:
    cache:
      ttl:
        last7m: ${DRAW_CACHE_TTL_LAST7M:5}
        todaym: ${DRAW_CACHE_TTL_TODAYM:5}
        nexts: ${DRAW_CACHE_TTL_NEXTS:60}

    scheduler:
      active: true
      windows:
        enabled: true
        timezone: America/New_York
        fetch_results: "12:00-14:00,20:00-23:00"
        settle_draws: "12:00-15:00,20:00-23:30"
        close_draws: "11:30-14:00,19:30-23:00"
        open_draws: "02:00-06:00"

    lifecycle:
      active: true
      generate_cron: "0 0 5 * * *"
      open_close_cron: "0 */5 * * * *"
      generation_days: 7
      batch_size: 500

    settlement:
      active: true
      cron: "0 */5 * * * *"
      days_back: 1
      max_draws_per_tenant: 500

    results:
      active: true
      apply-scheduler:
        active: false
      scheduler:
        active: true
        cron: "0 */5 * * * *"
        min_minutes_after_draw: 3
        max_minutes_after_draw: 120
        cooldown_minutes: 10
      limits:
        max_slots_per_tick: 100
      defaults:
        manual_days_back: 0
        manual_max_slots: 50
