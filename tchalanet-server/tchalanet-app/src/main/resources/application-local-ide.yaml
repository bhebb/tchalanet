server:
  port: 8083
app:
  cors:
    allowed-origins: https://app.localtest.me,https://auth.localtest.me,http://localhost:4200
  apiBaseUrl: ${APP_API_BASEURL:http://localhost:8083}
  security:
    required-audience: ""
# Feature flag to disable scheduled tasks inside the app even if @EnableScheduling is present
  scheduling:
    enabled: false

spring:
  # Disable scheduling globally for this profile (stops @Scheduled methods)
  scheduling:
    enabled: false

  main:
    allow-bean-definition-overriding: true
  jpa:
    hibernate:
      ddl-auto: none
  datasource:
    hikari:
      maximum-pool-size: 10
      jdbc-url: jdbc:postgresql://localhost:5432/tchalanet_db
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    repair-on-migrate: true   # repairs checksum mismatches automatically in dev


tch:
  identity:
    provider: ${TCH_IDENTITY_PROVIDER:firebase-emulator}
    firebase:
      project-id: ${FIREBASE_PROJECT_ID:demo-tchalanet-local}
      revocation-check-mode: ${FIREBASE_REVOCATION_CHECK_MODE:off}
      bootstrap:
        enabled: ${FIREBASE_BOOTSTRAP_ENABLED:true}
        auto-run-on-startup: ${FIREBASE_BOOTSTRAP_AUTO_RUN_ON_STARTUP:true}
        default-user-password: ${FIREBASE_BOOTSTRAP_DEFAULT_USER_PASSWORD:Changeme1!}
        users:
          - super_admin
          - admin
          - cashier

  admin:
    server:
      enabled: true
      local-open: true

  offlinesync:
    enabled: ${TCH_OFFLINESYNC_ENABLED:true}

  communication:
    edge:
      hmac-secret: ${EDGE_HMAC_SECRET:tch-local-ide-edge-hmac-2026}

  draw:
    results:
      notifications:
        slack:
          enabled: true
          channel: batch-draws   # → SLACK_WEBHOOK_BATCH_DRAWS sur l'edge
          priority: LOW
      scheduler:
        due:
          min_minutes_after_draw: 0
          max_minutes_after_draw: 1440
          lookback_minutes: 1440
        min-minutes-after-draw: 0
        max-minutes-after-draw: 1440
        cooldown-minutes: 10
      open-today:
        active: true
        cron: "0 */5 * * * *"
        default-sales-open-time: "00:00"
        max-items-per-run: 10000
  # Disable Spring Batch jobs in local IDE profile while debugging UI/docs
  batch:
    job:
      enabled: false

management:
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    com.tchalanet.server.common.bus: INFO
    io.opentelemetry.exporter.otlp: DEBUG   # remove after confirming traces flow to Jaeger

# No signing key set here — Ed25519ServerSigningService generates an ephemeral keypair
# at startup for local/dev profiles. Set TCH_SERVER_SIGNING_ED25519_PRIVATE_KEY_PKCS8_BASE64
# and TCH_SERVER_SIGNING_ED25519_PUBLIC_KEY_SPKI_BASE64 for staging/prod.
