app:
  cors:
    # http://localhost:* couvre tous les ports Flutter Web/DevTools en dev (port aléatoire)
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,https://app.localtest.me}
  api-base-url: ${APP_API_BASEURL:https://api.localtest.me:8443}

tch:
  tickets:
    public:
      # Base URL for the public ticket verification page (QR target).
      # Override per environment — dev uses the local web app URL.
      base-url: ${TCH_TICKET_PUBLIC_BASE_URL:https://api.localtest.me}

spring:
  main:
    allow-bean-definition-overriding: true

management:
  tracing:
    sampling:
      probability: ${OTEL_SAMPLER_PROBABILITY:1.0}
