# ===========================
# APPLICATION PROPERTIES
# ===========================
app:
  version: ${APP_VERSION:0.1.0}
  api-version: ${API_VERSION:v1}
  base-path: ${APP_BASE_PATH:/api}
  api-base-url: ${APP_API_BASEURL:http://localhost:8083}
  auth-url: ${TCH_KC_ISSUER:http://localhost:8080/realms/tchalanet}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://app.localtest.me}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,Accept,Origin
    exposed-headers: Location
    allow-credentials: true

tch:
  runtime:
    zone-id: ${TCH_RUNTIME_ZONE_ID:UTC}

  context:
    public-default-tenant-code: ${TCH_PUBLIC_DEFAULT_TENANT_CODE:tchalanet}

  system:
    user-id: ${TCH_SYSTEM_USER_ID:00000000-0000-0000-0000-000000000003}
    tenant-code: ${TCH_SYSTEM_TENANT_CODE:tchalanet}
    actor-name: ${TCH_SYSTEM_ACTOR_NAME:system}

  security:
    required-audience: ${TCH_SECURITY_REQUIRED_AUDIENCE:tchalanet-api}
    user-bootstrap:
      enabled: ${TCH_SECURITY_USER_BOOTSTRAP_ENABLED:true}
      update-last-login: ${TCH_SECURITY_USER_BOOTSTRAP_UPDATE_LAST_LOGIN:true}

  admin:
    server:
      enabled: ${TCH_ADMIN_SERVER_ENABLED:false}

  communication:
    edge:
      enabled: ${TCH_COMMUNICATION_EDGE_ENABLED:true}
      # Infra standardizes on TCH_EDGE_BASE_URL (envs/common/api.env); fall back to the older
      # TCH_COMMUNICATION_EDGE_BASE_URL, then localhost for bare local runs.
      base-url: ${TCH_EDGE_BASE_URL:${TCH_COMMUNICATION_EDGE_BASE_URL:http://localhost:3000}}
      messages-path: ${TCH_COMMUNICATION_EDGE_MESSAGES_PATH:/internal/messages/send}
      hmac-secret: ${EDGE_HMAC_SECRET}
      connect-timeout: ${TCH_COMMUNICATION_EDGE_CONNECT_TIMEOUT:2s}
      read-timeout: ${TCH_COMMUNICATION_EDGE_READ_TIMEOUT:5s}
  cache:
    redis:
      enabled: false

  news:
    ttl:
      hours: 1
    cache:
      key: news
      cacheName: news
    refresh:
#      cron: "0 0 * * * *"
      cron: "0 */5 * * * *"
    provider:
      url: ${TCH_NEWS_PROVIDER_URL:https://lotterydaily.com/feed/}

  sales:
    tickets:
      visibility:
        public-visibility-days: 90

  tickets:
    public:
      # Base URL for the public ticket verification page (QR target).
      # Override per environment — dev uses the local web app URL.
      base-url: ${TCH_TICKET_PUBLIC_BASE_URL:https://tchalanet.com}
      ticket-path-template: ${TCH_TICKET_PATH_TEMPLATE:/public/check-ticket?code={code}}

  public-contact:
    notify:
      enabled: ${TCH_PUBLIC_CONTACT_NOTIFY_ENABLED:true}
      recipients:
        - admin@tchalanet.com
      cc: []

  public:
    tickets:
      rate-limit:
        enabled: true
        requests-per-second: 10
        burst: 20

  offlinesync:
    enabled: ${TCH_OFFLINESYNC_ENABLED:false}
    upcoming-draws:
      lookahead-days: ${TCH_OFFLINESYNC_UPCOMING_DRAWS_DAYS:3}
      limit: ${TCH_OFFLINESYNC_UPCOMING_DRAWS_LIMIT:50}

  limitpolicy:
    offline:
      enabled: ${TCH_LIMITPOLICY_OFFLINE_ENABLED:true}
      batch-size: ${TCH_LIMITPOLICY_OFFLINE_BATCH_SIZE:50}
      validity-duration: ${TCH_LIMITPOLICY_OFFLINE_VALIDITY:PT8H}
      sync-accepted-extension: ${TCH_LIMITPOLICY_OFFLINE_SYNC_EXT:PT72H}
      max-ticket-count: ${TCH_LIMITPOLICY_OFFLINE_MAX_TICKETS:50}
      max-total-amount: ${TCH_LIMITPOLICY_OFFLINE_MAX_TOTAL:100000.00}
      currency: ${TCH_LIMITPOLICY_OFFLINE_CURRENCY:HTG}

  sales-session:
    auto:
      active: true
      open-cron: "0 0 5 * * *"
      close-cron: "0 0 20 * * *"
  batch:
    executor:
      core-pool-size: 4
      max-pool-size: 8
      thread-name-prefix: batch-

kc:
  bootstrap:
    enabled: ${KC_BOOTSTRAP_ENABLED:false}
    auto-run-on-startup: ${KC_BOOTSTRAP_AUTO_RUN_ON_STARTUP:false}
    base-url: ${KC_BASE_URL:https://auth.localtest.me}
    target-realm: ${KC_TARGET_REALM:tchalanet}
    admin-realm: ${KC_ADMIN_REALM:master}
    admin-username: ${KC_ADMIN_USERNAME:admin}
    admin-password: ${KC_ADMIN_PASSWORD:admin}
    admin-password-file: ${KC_ADMIN_PASSWORD_FILE:}
    default-user-password: ${KC_DEFAULT_USER_PASSWORD:Changeme1!}
    users:
      - super_admin
      - admin
      - cashier

# ===========================
# SPRING FRAMEWORK
# ===========================
spring:
  boot:
    admin:
      context-path: /admin/ops

  profiles:
    group:
      local-ide-redis: local-ide

  # Thymeleaf — this is a REST API, no templates; silence the startup warning
  thymeleaf:
    check-template-location: false

  # Exclude all Redis autoconfiguration — our RedisCacheRuntimeConfig handles it conditionally
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.data.redis.RedisHealthContributorAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.data.redis.RedisReactiveHealthContributorAutoConfiguration

  config:
    import:
      - optional:classpath:application-draw.yaml
      - optional:classpath:application-uslottery.yaml

  # --- servlet path: ensure all MVC and Spring Data REST endpoints are prefixed with /api/v1 ---
  mvc:
    servlet:
      path: ${app.base-path}/${app.api-version}

  # global web security debug flag (default false)
  websecurity:
    debug: false

  # --- Datasource & JPA ---
  datasource:
    hikari:
      # An audited write (e.g. ticket sell) holds two connections at once: its own
      # @Transactional plus the audit's REQUIRES_NEW nested tx. With a pool of 10 that
      # caps real concurrency at ~5 before the pool starves and requests time out
      # (HikariPool "Connection is not available"). Size for the documented E2E
      # concurrency target (controlled parallelism up to ~10) with headroom.
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL:30}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:5}
      jdbc-url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/tchalanet_db}
      username: ${SPRING_DATASOURCE_USERNAME:app_user}
      password: ${SPRING_DATASOURCE_PASSWORD:devpass}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      org.hibernate.envers.audit_table_suffix: "_aud"
      org.hibernate.envers.store_data_at_delete: true
      org.hibernate.envers.revision_field_name: "rev"
      org.hibernate.envers.revision_type_field_name: "revtype"
      org.hibernate.envers.revision_listener: "com.tchalanet.server.platform.audit.internal.listener.TchRevisionListener"

      hibernate.type.json_format_mapper: jackson3
  batch:
    jdbc:
      initialize-schema: never   # on laisse Flyway créer les tables
    job:
      enabled: false             # pas de job auto au démarrage (on les lance via API / schedulers)

  # --- Database Migration ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public,batch


  # --- Security (OAuth2 Resource Server) ---
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/tchalanet
          # jwk-set-uri explicite — évite la discovery OIDC au démarrage depuis Docker.
          # Surchargé par SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI en dev pour la
          # validation du claim iss (KC_HOSTNAME externe), mais les clés sont toujours
          # récupérées depuis l'URL interne Keycloak sans traverser Traefik.
          jwk-set-uri: http://keycloak:8080/realms/tchalanet/protocol/openid-connect/certs

  # --- Redis Cache ---
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000
      repositories:
        enabled: false
    rest:
      enabled: true
      base-path: /_sdr
      detection-strategy: annotated

# ===========================
# API DOCUMENTATION
# ===========================
springdoc:
  api-docs:
    path: /openapi
    enabled: true
  swagger-ui:
    path: /swagger-ui
    display-operation-id: true
    try-it-out-enabled: true
    filter: true
    oauth:
      client-id: ${SWAGGER_CLIENT_ID:tchalanet-swagger}
      use-pkce-with-authorization-code-grant: true
    oauth2-redirect-url: https://auth.localtest.me/swagger-ui/oauth2-redirect.html

# ===========================
# LOGGING
# ===========================
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.tchalanet.server: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.security.oauth2.jwt: INFO
    org.springframework.security.oauth2.server.resource: INFO
    org.hibernate.SQL: INFO


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,scheduledtasks,loggers,threaddump,env,beans
  # Notification flow configuration
  flows:
    draw-lifecycle:
      enabled: true
      slack-info-enabled: false  # Quiet by default
      email-enabled: false
    draw-results:
      enabled: true
      slack-enabled: true
      email-detail-enabled: true  # Dev/debug detail
      watched-providers:
        - NY
        - FL
      watched-slots:
        - NY_MID
        - NY_EVE
        - FL_MID
        - FL_EVE
    apply:
      enabled: true
      slack-info-enabled: false
      email-on-warning-enabled: true
      email-on-failure-enabled: true
    settlement:
      enabled: true
      slack-info-enabled: false
      email-admin-enabled: false
    sales-reports:
      enabled: false
      daily-email-enabled: false
    client-delivery:
      enabled: false
      ticket-sold-enabled: false
      ticket-won-enabled: false

  keymanagement:
    server-signing:
      active-key-id: ${TCH_SERVER_SIGNING_KEY_ID:server-signing-key-2026-01}
      algorithm: ED25519
      private-key-pkcs8-base64: ${TCH_SERVER_SIGNING_ED25519_PRIVATE_KEY_PKCS8_BASE64}
      public-key-spki-base64: ${TCH_SERVER_SIGNING_ED25519_PUBLIC_KEY_SPKI_BASE64}
