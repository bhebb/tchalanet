tch:
  us-lottery:
    enabled: ${TCH_US_LOTTERY_ENABLED:true}

    common:
      holidays: [ "01-01", "12-25" ]

    providers:
      ny:
        enabled: ${TCH_US_NY_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_NY_TIMEZONE:America/New_York}
        base-url: ${TCH_US_LOTTERY_NY_BASEURL:https://nylottery.ny.gov}
        latest-path: ${TCH_US_LOTTERY_NY_LATEST_PATH:/drupal-api/api/v2/winning_numbers}
        app-token: ${TCH_US_LOTTERY_NY_APP_TOKEN:wEXP9hRoJxlnHdkl9MbNbBuBA}
        headers:
          Accept: application/json, text/plain, */*
          Referer: https://nylottery.ny.gov/all-winning-numbers
      fl:
        enabled: ${TCH_US_FL_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_FL_TIMEZONE:America/New_York}
        base-url: ${TCH_US_FL_LOTTERY_BASEURL:https://apim-website-prod-eastus.azure-api.net}
        latest-path: ${TCH_US_FL_LATEST_PATH:/drawgamesapp/getLatestDrawGames}
        alert-path: ${TCH_US_FL_ALERT_PATH:/site/services/alert}
        headers:
          Accept: application/json
          x-partner: web
          Origin: https://floridalottery.com
          Referer: https://floridalottery.com/
          User-Agent: Tchalanet/1.0 (+https://tchalanet.com)

      ga:
        enabled: ${TCH_US_GA_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_GA_TIMEZONE:America/New_York}
        base-url: ${TCH_US_GA_LOTTERY_BASEURL:https://www.galottery.com}
        latest-path: ${TCH_US_GA_LATEST_PATH:/api/v2/draw-games/draws?previous-draws=10&game-names=CASH+3,CASH+4}
        headers:
          Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8
          Accept-Language: en-US,en;q=0.9

      tx:
        enabled: ${TCH_US_TX_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_TX_TIMEZONE:America/Chicago}
        base-url: ${TCH_US_TX_LOTTERY_BASEURL:https://www.texaslottery.com}
        latest-path: ${TCH_US_TX_LATEST_PATH:/export/sites/lottery/rss/tlc_latest.xml}
        headers: {}

      tn:
        enabled: ${TCH_US_TN_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_TN_TIMEZONE:America/Chicago}
        base-url: ${TCH_US_TN_LOTTERY_BASEURL:https://www.tnlottery.com}
        latest-path: ${TCH_US_TN_LATEST_PATH:}
        headers: {}

      # Full client: RSS feed. Set TCH_US_PA_LOTTERY_BASEURL + TCH_US_PA_LATEST_PATH to activate.
      pa:
        enabled: ${TCH_US_PA_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_PA_TIMEZONE:America/New_York}
        base-url: ${TCH_US_PA_LOTTERY_BASEURL:https://www.palottery.state.pa.us}
        latest-path: ${TCH_US_PA_LATEST_PATH:}
        headers: {}

      # Enum-only — no client registered. Results via manual proposal.
      nj:
        enabled: ${TCH_US_NJ_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_NJ_TIMEZONE:America/New_York}
        base-url: ${TCH_US_NJ_LOTTERY_BASEURL:https://www.njlottery.com}
        latest-path: ${TCH_US_NJ_LATEST_PATH:}
        headers: {}

      ca:
        enabled: ${TCH_US_CA_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_CA_TIMEZONE:America/Los_Angeles}
        base-url: ${TCH_US_CA_LOTTERY_BASEURL:https://www.calottery.com}
        latest-path: ${TCH_US_CA_LATEST_PATH:}
        headers: {}

      mo:
        enabled: ${TCH_US_MO_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_MO_TIMEZONE:America/Chicago}
        base-url: ${TCH_US_MO_LOTTERY_BASEURL:https://www.molottery.com}
        latest-path: ${TCH_US_MO_LATEST_PATH:}
        headers: {}

      il:
        enabled: ${TCH_US_IL_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_IL_TIMEZONE:America/Chicago}
        base-url: ${TCH_US_IL_LOTTERY_BASEURL:https://www.illinoislottery.com}
        latest-path: ${TCH_US_IL_LATEST_PATH:}
        headers: {}

      mi:
        enabled: ${TCH_US_MI_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_MI_TIMEZONE:America/Detroit}
        base-url: ${TCH_US_MI_LOTTERY_BASEURL:https://www.michiganlottery.com}
        latest-path: ${TCH_US_MI_LATEST_PATH:}
        headers: {}

      oh:
        enabled: ${TCH_US_OH_LOTTERY_ENABLED:true}
        timezone: ${TCH_US_OH_TIMEZONE:America/New_York}
        base-url: ${TCH_US_OH_LOTTERY_BASEURL:https://www.ohiolottery.com}
        latest-path: ${TCH_US_OH_LATEST_PATH:}
        headers: {}
