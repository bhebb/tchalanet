[pytest]
markers =
    L0: boot smoke — every run
    L1: daily smoke — main happy paths
    L2: business critical — nightly/pre-merge
    L3: concurrency correctness — on demand
    public: public runtime tests — no auth required
    cashier_pos: cashier POS flow tests
    onboarding: tenant/user/outlet/terminal onboarding tests
    auth_context: role-based access and token security tests
    ticket_sizes: short/medium/long ticket sell tests
    dashboard: page-model dashboard resolution tests (tenant/platform/public)
    overview: tenant/platform overview structural-diagnosis tests
    platformadmin: platform admin overview and global-stats tests
    readiness: tenant readiness diagnosis tests
    multitenant: cross-tenant RLS isolation and concurrency tests
    slow: tests that hit external providers or generate large artifacts
