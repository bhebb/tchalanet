name: CI

on:
  push:
    branches: ['main']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm eslint . --ext .ts,.js,.html

      - name: Lint (Stylelint)
        run: pnpm stylelint "libs/**/*.{scss,css}"
      # (tu l'activeras après avoir branché stylelint)

      - name: Build
        run: pnpm build
