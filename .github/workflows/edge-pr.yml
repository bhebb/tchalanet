name: Edge PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'tchalanet-edge-service/**'
      - '.github/workflows/edge-pr.yml'
  workflow_dispatch:

concurrency:
  group: edge-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tchalanet-edge-service

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.x'

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.19.0 --activate

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint --if-present

      - name: Test
        run: pnpm test --if-present

      - name: Build
        run: pnpm build
