name: Vercel Preview

on:
  push:
    branches: [main]
    paths:
      - 'tchalanet-web/**'
      - '.github/workflows/vercel-preview.yml'

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
          cache-dependency-path: tchalanet-web/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: tchalanet-web

      - name: Build
        run: pnpm nx build tch-portal --configuration=production
        working-directory: tchalanet-web

      - name: Package for Vercel
        working-directory: tchalanet-web
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/apps/tch-portal/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "src": "^/realms(/.*)?$", "status": 404 },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Deploy preview
        run: npx vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }}
