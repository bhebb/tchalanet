name: Build and Publish Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Optional image tag to use (overrides auto tag)'
        required: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_OWNER: tchalanet

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine image tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.image-tag }}" ]]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image-tag }}" >> $GITHUB_ENV
          else
            short_sha=$(echo "${GITHUB_SHA}" | cut -c1-8)
            echo "IMAGE_TAG=stg-${short_sha}" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & push API image
      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: ./tchalanet-server
          file: ./tchalanet-server/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/api:${{ env.IMAGE_TAG }}
          platforms: linux/amd64,linux/arm64

      # Optionally build Keycloak custom image (stage includes maven build)
      - name: Build and push Keycloak custom image
        uses: docker/build-push-action@v4
        with:
          context: ./tchalanet-infra/keycloak
          file: ./tchalanet-infra/keycloak/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/keycloak:${{ env.IMAGE_TAG }}
          platforms: linux/amd64,linux/arm64

      - name: Output images
        run: |
          echo "API image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/api:${{ env.IMAGE_TAG }}"
          echo "Keycloak image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/keycloak:${{ env.IMAGE_TAG }}"

      - name: Create release note
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Published images with tag $IMAGE_TAG"

