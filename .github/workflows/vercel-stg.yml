name: Vercel Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch ou commit à déployer'
        required: false
        default: 'main'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'
          cache-dependency-path: tchalanet-web/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: tchalanet-web

      - name: Build
        run: pnpm nx build tch-portal --configuration=production
        working-directory: tchalanet-web

      - name: Package for Vercel
        run: |
          mkdir -p .vercel/output/static
          cp -r tchalanet-web/dist/apps/tch-portal/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "src": "^/realms(/.*)?$", "status": 404 },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Deploy to staging (production slot)
        run: npx vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
