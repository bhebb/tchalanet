name: Build Web App

on:
  push:
    paths:
      - 'apps/tchalanet-web/**'
      - 'libs/ui/**'
      - '.github/workflows/web.yml'
  workflow_dispatch: {}

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install deps
        run: |
          pnpm install --frozen-lockfile

      - name: Generate theme registry (lib)
        run: |
          # The theme registry generator lives under tchalanet-infra/web and
          # produces a TS registry used by the theme lib. Run it before building
          # the web app so the registry is available during the build.
          if [ -f tchalanet-infra/web/generate-theme-registry.mjs ]; then
            node tchalanet-infra/web/generate-theme-registry.mjs
          else
            echo 'No generate-theme-registry.mjs found; skipping'
          fi

      - name: Build theme lib (if present)
        run: |
          if [ -f libs/ui/theme/package.json ]; then
            pnpm --filter libs/ui/theme... build || true
          else
            echo 'libs/ui/theme not present; skipping theme build'
          fi

      - name: Build web app
        run: |
          pnpm build:web

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/apps/tchalanet-web/**

