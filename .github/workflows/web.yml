name: Web CI

on:
  push:
    branches: [ '**' ]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'nx.json'
      - 'project.json'
      - 'workspace.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'eslint.config.mjs'
      - '.stylelintrc.cjs'
      - 'tsconfig.json'
      - 'tsconfig.*.json'
  pull_request:
    branches: [ main, prod ]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'nx.json'
      - 'project.json'
      - 'workspace.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'eslint.config.mjs'
      - '.stylelintrc.cjs'
      - 'tsconfig.json'
      - 'tsconfig.*.json'
jobs:
  web_lint_build_test:
    runs-on: ubuntu-latest
    name: Lint & Build & Test Web/Mobile
    strategy:
      matrix:
        node-version: [ 20 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            nx-${{ runner.os }}-

      - name: Sets the base and head SHAs for the nx affected commands in CI
        uses: nrwl/nx-set-shas@v4

      # (optionnel) scan sécu + orthographe, commente si tu veux aller au plus vite
      # - name: Security & spell scan
      #   run: pnpm scan

      - name: ESLint (affected)
        run: pnpm lint

      - name: Stylelint (SCSS / tokens / BEM)
        run: pnpm lint:styles

      # Souple: si le target "typecheck" n'existe pas partout, on n'échoue pas la CI
      - name: Typecheck (affected)
        run: pnpm exec nx affected -t=typecheck --base=origin/main --head=HEAD --parallel=3 || true

      - name: Build Web
        run: pnpm build:web

      - name: Build Mobile
        run: pnpm build:mobile

      # E2E uniquement sur projets affectés, non bloquant pour ne pas freiner au début
      - name: E2E Web (affected)
        run: pnpm exec nx affected -t=e2e --base=origin/main --head=HEAD --parallel=1 || true
