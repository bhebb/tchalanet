name: Manual Prod Deploy - tchalanet-server

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Tag version à déployer (ex: v1.3.0)"
        required: true
      sha:
        description: "Commit SHA promu depuis staging (ex: abcd1234)"
        required: true

jobs:
  release-prod:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOCKER_HOST: ssh://${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Retag & push semver
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/tchalanet-server:sha-${{ github.event.inputs.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/tchalanet-server:sha-${{ github.event.inputs.sha }} \
                     ghcr.io/${{ github.repository_owner }}/tchalanet-server:${{ github.event.inputs.version_tag }}
          docker push ghcr.io/${{ github.repository_owner }}/tchalanet-server:${{ github.event.inputs.version_tag }}

      - name: Deploy prod (docker compose)
        run: |
          cd tchalanet-infra
          API_TAG=${{ github.event.inputs.version_tag }} \
          docker compose --env-file envs/prod/.env \
            -f docker-compose.yml -f docker-compose.prod.yml pull api
          API_TAG=${{ github.event.inputs.version_tag }} \
          docker compose --env-file envs/prod/.env \
            -f docker-compose.yml -f docker-compose.prod.yml up -d
