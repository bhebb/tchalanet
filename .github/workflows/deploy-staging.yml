name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      build_api:
        description: 'Build et push image API'
        required: false
        default: 'false'
        type: boolean
      build_web:
        description: 'Build et push image Web'
        required: false
        default: 'false'
        type: boolean
      build_edge:
        description: 'Build et push image Edge'
        required: false
        default: 'false'
        type: boolean
      deploy_infra:
        description: 'Déployer les services infra sur staging'
        required: false
        default: 'true'
        type: boolean
      image_tag:
        description: 'Tag image (vide = sha-<short_sha>)'
        required: false
        default: ''
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  compute-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Compute IMAGE_TAG
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=sha-$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT
          fi

  build-api:
    needs: compute-tag
    if: inputs.build_api == true
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.compute-tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Maven package
        run: ./mvnw -B -DskipTests -DskipITs=true package -f tchalanet-server/pom.xml

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./tchalanet-server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/tchalanet-api:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.IMAGE_TAG }}

  build-edge:
    needs: compute-tag
    if: inputs.build_edge == true
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.compute-tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.x'

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.19.0 --activate

      - name: Install deps
        working-directory: tchalanet-edge-service
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: tchalanet-edge-service
        run: pnpm build

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Edge image
        uses: docker/build-push-action@v6
        with:
          context: ./tchalanet-edge-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/tchalanet-edge:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.IMAGE_TAG }}

  deploy:
    needs: [compute-tag, build-api, build-edge]
    if: |
      always() &&
      inputs.deploy_infra == true &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_TAG: ${{ needs.compute-tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Push infra files to server
        run: |
          chmod +x tchalanet-infra/scripts/remote/*.sh || true
          ./tchalanet-infra/scripts/remote/push-infra.sh "${{ secrets.SERVER_HOST }}"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: tch
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/tchalanet-infra

            docker network create edge-staging || true
            docker network create back-staging || true

            make env-prepare ENV=staging || true

            if [ -z "${{ secrets.DOPPLER_TOKEN_STG }}" ]; then
              echo "DOPPLER_TOKEN_STG manquant" >&2; exit 1
            fi
            docker run --rm \
              -e DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_STG }}" \
              -v "$PWD":/work -w /work \
              dopplerhq/cli:3.72 \
              sh -lc 'doppler secrets download --format env --project tchalanet --config staging > envs/staging/.secrets && chmod 600 envs/staging/.secrets'

            IMAGE_TAG="${{ env.IMAGE_TAG }}" make deploy ENV=staging || \
            docker compose --env-file envs/staging/compose.env \
              -f compose/docker-compose-traefik.yml \
              -f compose/docker-compose-postgres.yml \
              -f compose/docker-compose-redis.yml \
              -f compose/docker-compose-keycloak.yml \
              up -d

            echo "Staging deploy done — IMAGE_TAG=${{ env.IMAGE_TAG }}"
