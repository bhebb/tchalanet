name: Deploy Infra

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment (staging|prod)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      mode:
        description: "Action à effectuer: create (tout créer) ou update (services sélectionnés)"
        required: true
        default: "update"
        type: choice
        options: [create, update]
      services:
        description: "Liste CSV des services à mettre à jour (ex: traefik,postgres,redis,keycloak,unleash,umami,meilisearch). Ignoré en mode create."
        required: false
        default: ""
        type: string

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Host
        run: |
          echo "${{ secrets.SERVER_HOST }}" > host.txt
          ssh-keyscan -H $(cat host.txt) >> ~/.ssh/known_hosts

      - name: Push infra & prepare
        run: |
          chmod +x tchalanet-infra/scripts/remote/*.sh || true
          ./tchalanet-infra/scripts/remote/push-infra.sh "${{ secrets.SERVER_HOST }}"

      - name: Prepare and run (remote)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: tch
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/tchalanet-infra

            ENV_INPUT="${{ github.event.inputs.env }}"
            MODE="${{ github.event.inputs.mode }}"
            SERVICES_CSV="${{ github.event.inputs.services }}"

            echo "→ ENV=$ENV_INPUT MODE=$MODE SERVICES=$SERVICES_CSV"

            # Réseaux docker
            docker network create "edge-$ENV_INPUT" || true
            docker network create "back-$ENV_INPUT" || true

            # Préparer envs (.env.merged)
            make env-prepare ENV="$ENV_INPUT" || true

            # Secrets via Doppler (secret GitHub par environnement requis)
            if [ "$ENV_INPUT" = "prod" ]; then CONFIG=production; TOKEN='${{ secrets.DOPPLER_TOKEN_PROD }}'; else CONFIG=staging; TOKEN='${{ secrets.DOPPLER_TOKEN_STG }}'; fi
            if [ -z "$TOKEN" ]; then echo "DOPPLER token manquant pour $ENV_INPUT" >&2; exit 1; fi
            docker run --rm -e DOPPLER_TOKEN="$TOKEN" -v "$PWD":/work -w /work \
              dopplerhq/cli:latest \
              sh -lc 'doppler secrets download --format env --project tchalanet --config '"$CONFIG"' > envs/'"$ENV_INPUT"'/.secrets && chmod 600 envs/'"$ENV_INPUT"'/.secrets'

            svc_file() {
              case "$1" in
                traefik) echo "compose/docker-compose-traefik.yml";;
                postgres) echo "compose/docker-compose-postgres.yml";;
                redis) echo "compose/docker-compose-redis.yml";;
                keycloak) echo "compose/docker-compose-keycloak.yml";;
                unleash) echo "compose/docker-compose-unleash.yml";;
                meilisearch) echo "compose/docker-compose-meilisearch.yml";;
                *) return 1;;
              esac
            }

            # Build args for docker compose
            build_args_from_services() {
              local files=""; local names=()
              for raw in $(echo "$1" | tr ',' ' '); do
                s=$(echo "$raw" | tr '[:upper:]' '[:lower:]' | xargs)
                [ -z "$s" ] && continue
                f=$(svc_file "$s") || { echo "(warn) service inconnu: $s"; continue; }
                # Accumuler -f sans doublons
                case " $files " in *" -f $f "*) ;; *) files="$files -f $f";; esac
                names+=("$s")
              done
              echo "FILES=$files"; printf "NAMES=%s\n" "${names[*]}"
            }

            if [ "$MODE" = "create" ]; then
              # Full stack infra (ordre recommandé)
              CORE_PULL="compose/docker-compose-traefik.yml compose/docker-compose-postgres.yml compose/docker-compose-keycloak.yml compose/docker-compose-unleash.yml compose/docker-compose-redis.yml compose/docker-compose-meilisearch.yml"
              for f in $CORE_PULL; do
                if [ -f "$f" ]; then docker compose --env-file envs/$ENV_INPUT/compose.env -f "$f" pull || true; fi
              done

              # Traefik
              docker compose --env-file envs/$ENV_INPUT/compose.env -f compose/docker-compose-traefik.yml up -d
              # Postgres
              docker compose --env-file envs/$ENV_INPUT/compose.env -f compose/docker-compose-postgres.yml up -d
              # Core apps
              docker compose --env-file envs/$ENV_INPUT/compose.env \
                -f compose/docker-compose-keycloak.yml \
                -f compose/docker-compose-unleash.yml \
                -f compose/docker-compose-redis.yml \
                -f compose/docker-compose-meilisearch.yml \
                up -d

              echo "✔ Infra créée/actualisée pour $ENV_INPUT"
            else
              # Update: services sélectionnés
              if [ -z "$SERVICES_CSV" ]; then echo "Veuillez fournir 'services' (CSV) en mode update" >&2; exit 2; fi
              eval $(build_args_from_services "$SERVICES_CSV")
              # pull and up
              if [ -n "$FILES" ]; then
                docker compose --env-file envs/$ENV_INPUT/compose.env $FILES pull || true
                # Convert NAMES to array by splitting on space
                set +u
                names_arr=( $NAMES )
                set -u
                docker compose --env-file envs/$ENV_INPUT/compose.env $FILES up -d ${names_arr[@]}
                echo "✔ Services mis à jour: $NAMES"
              else
                echo "Aucun service valide fourni" >&2; exit 3
              fi
            fi

            # Afficher l'état des services
            docker compose --env-file envs/$ENV_INPUT/compose.env \
              -f compose/docker-compose-traefik.yml \
              -f compose/docker-compose-postgres.yml \
              -f compose/docker-compose-keycloak.yml \
              -f compose/docker-compose-unleash.yml \
              -f compose/docker-compose-redis.yml \
              -f compose/docker-compose-meilisearch.yml \
              ps || true
