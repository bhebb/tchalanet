name: Publish Images

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging or production)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      tag:
        description: 'Image tag (leave empty for auto: stg-<sha> or prd-<sha>)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            PREFIX="${{ inputs.environment == 'production' && 'prd' || 'stg' }}"
            TAG="${PREFIX}-$(git rev-parse --short HEAD)"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "📦 Using tag: ${TAG}"

      - name: Build API (Maven)
        working-directory: ./tchalanet-server
        run: |
          ./mvnw -B -DskipTests clean package
          echo "✅ API built successfully"

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./tchalanet-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tchalanet-api:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/tchalanet-api:${{ inputs.environment }}-latest
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}

      - name: Build and push Keycloak image
        uses: docker/build-push-action@v7
        with:
          context: ./tchalanet-infra/keycloak
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tchalanet-keycloak:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/tchalanet-keycloak:${{ inputs.environment }}-latest
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}

      - name: Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## 📦 Images Published

          | Image | Tag | Registry |
          |-------|-----|----------|
          | tchalanet-api | \`${{ steps.tag.outputs.tag }}\` | ghcr.io/${{ github.repository_owner }} |
          | tchalanet-keycloak | \`${{ steps.tag.outputs.tag }}\` | ghcr.io/${{ github.repository_owner }} |

          ### 🚀 Next Steps

          **On ${{ inputs.environment }} server:**

          \`\`\`bash
          cd /opt/tchalanet-infra/compose
          
          # Pull new images
          docker compose -f docker-compose-project.yml \\
            -f docker-compose-keycloak.yml \\
            -f docker-compose-api.yml \\
            -f docker-compose-unleash.yml \\
            pull
          
          # Restart services
          docker compose -f docker-compose-project.yml \\
            -f docker-compose-keycloak.yml \\
            -f docker-compose-api.yml \\
            -f docker-compose-unleash.yml \\
            up -d api keycloak
          \`\`\`

          ### 📋 Images URLs

          - API: https://github.com/${{ github.repository_owner }}/tchalanet/pkgs/container/tchalanet-api
          - Keycloak: https://github.com/${{ github.repository_owner }}/tchalanet/pkgs/container/tchalanet-keycloak
          EOF

