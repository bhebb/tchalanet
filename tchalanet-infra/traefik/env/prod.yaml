http:
  routers:
    traefik-dash:
      rule: Host(`traefik.tchalanet.com`)
      entryPoints: [ websecure ]
      service: api@internal
      tls:
        certResolver: letsencrypt
      middlewares: [ secure-headers@file ]

    api:
      rule: Host(`api.tchalanet.com`)
      entryPoints: [websecure]
      service: api-svc
      tls:
        certResolver: letsencrypt
      middlewares: [secure-headers@file, gzip@file]

    unleash:
      rule: Host(`flags.tchalanet.com`)
      entryPoints: [websecure]
      service: unleash-svc
      tls:
        certResolver: letsencrypt
      middlewares: [secure-headers@file, gzip@file]

    meilisearch:
      rule: Host(`search.tchalanet.com`)
      entryPoints: [websecure]
      service: meili-svc
      tls:
        certResolver: letsencrypt
      middlewares: [secure-headers@file, gzip@file]

  services:
    api-svc:
      loadBalancer:
        servers:
          - url: "http://api:8080"

    unleash-svc:
      loadBalancer:
        servers:
          - url: "http://unleash:4242"

    meili-svc:
      loadBalancer:
        servers:
          - url: "http://meilisearch:7700"
