http:
  routers:
    # Traefik Dashboard
    traefik-dash:
      rule: Host(`traefik.localtest.me`)
      entryPoints: [ websecure ]
      service: api@internal
      tls: { }
      middlewares: [ secure-headers@file ]

    # Backend API
    api:
      rule: Host(`api.localtest.me`)
      entryPoints: [ websecure, mobile-https ]
      service: api-svc
      tls: { }
      middlewares: [ secure-headers@file, gzip@file ]

    # Edge service (dev)
    edge:
      rule: Host(`edge.localtest.me`)
      entryPoints: [ websecure, mobile-https ]
      service: edge-svc
      tls: { }
      middlewares: [ secure-headers@file, gzip@file ]

    # Web App (Angular/Nx)
    web-app:
      rule: Host(`app.localtest.me`)
      entryPoints: [ websecure ]
      service: web-svc
      tls: { }
      middlewares: [ secure-headers@file, gzip@file ]

    # Mobile App (Ionic/Angular)
    mobile-app:
      rule: Host(`mob.localtest.me`)
      entryPoints: [ websecure ]
      service: mobile-svc
      tls: { }
      middlewares: [ secure-headers@file, gzip@file ]

  services:
    api-svc:
      loadBalancer:
        servers:
          - url: "http://api:8080"
    edge-svc:
      loadBalancer:
        servers:
          - url: "http://edge-service:3000"
    web-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:4200"
    mobile-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:4201"

# TLS Configuration pour développement local (mkcert)
tls:
  certificates:
    - certFile: /etc/traefik/certs/local-cert.pem
      keyFile: /etc/traefik/certs/local-key.pem
