# Listen on all (protected by Docker network + TLS)
listen_addresses = '*'
port = 5432

# TLS
ssl = off
#ssl_cert_file = '/etc/postgresql/ssl/server.crt'
#ssl_key_file  = '/etc/postgresql/ssl/server.key'
#ssl_ca_file   = '/etc/postgresql/ssl/ca.crt'
#password_encryption = scram-sha-256

# Connections
max_connections = 200
# Memory: tune per host. Rough starting point for a 2–4GB host:
shared_buffers = 512MB
work_mem = 16MB
maintenance_work_mem = 256MB
effective_cache_size = 2GB
random_page_cost = 1.1

# WAL / checkpoints
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# Autovacuum
autovacuum = on
track_counts = on

# Logging
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 10MB
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# Diagnostics
track_io_timing = on
track_functions = all
track_activity_query_size = 2048

# Keep conf modular
#include_if_exists = '/etc/postgresql/include/*.conf'
