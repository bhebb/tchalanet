# local socket
local   all   postgres                                 peer
local   all   all                                      scram-sha-256

# loopback (non-TLS ok for local tools)
host    all   all           127.0.0.1/32               scram-sha-256
host    all   all           ::1/128                    scram-sha-256

# ======================= STAGING NETWORK ACCESS =======================
# Remplacer les CIDR ci-dessous par ceux réels de vos réseaux Docker:
#   docker network inspect back-staging | jq -r '.[0].IPAM.Config[0].Subnet'
#   docker network inspect edge-staging | jq -r '.[0].IPAM.Config[0].Subnet'
# Exemple: 172.23.0.0/16 ou 172.23.0.0/24 selon votre configuration.
# Autorise uniquement les services internes (API, Keycloak, Redis, Unleash, Meili) à se connecter.

# Réseau back (services applicatifs)
host    all   all           172.19.0.0/16              scram-sha-256   # back-staging CIDR réel

# Réseau edge (reverse proxy / entrée HTTP) — n'autoriser que si un service sur edge doit accéder directement à Postgres.
# Si aucun service sur edge n'a besoin d'accès DB, laissez ces lignes commentées.
# Règle large:
# host    all   all           172.18.0.0/16              scram-sha-256   # edge-staging CIDR réel
# Variante durcie (décommentez uniquement ce dont vous avez besoin):
# host    keycloak_db    kc_user        172.18.0.0/16   scram-sha-256
# host    tchalanet_db   app_user       172.18.0.0/16   scram-sha-256
# host    unleash_db     unleash_user   172.18.0.0/16   scram-sha-256

# (Optionnel) Autoriser un sous-réseau d'administration Bastion / VPN
# host    all   all           10.10.0.0/24               scram-sha-256   # TODO: CIDR admin

# ======================= REPLICATION (optionnel) =======================
# Décommentez si vous ajoutez un nœud de réplication ou un service de dump externe
# host    replication postgres 172.23.0.0/16             scram-sha-256

# ======================= HARDENING =======================
# Pas d'accès global 0.0.0.0/0 pour éviter expositions accidentelles.
# Utiliser uniquement des CIDR ciblés ci-dessus.
# ======================================================================

# Docker network — REQUIRE TLS (laissé commenté; à activer si vous configurez SSL interne)
#hostssl all   all           10.0.0.0/8                 scram-sha-256
#hostssl all   all           172.16.0.0/12              scram-sha-256
#hostssl all   all           192.168.0.0/16             scram-sha-256

# Optional: narrow to your actual back network CIDR instead of broad RFC1918 ranges
# hostssl all all 172.19.0.0/16 scram-sha-256
