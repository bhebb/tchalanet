# Temporary override to expose Unleash API on host (for local debugging only)
# Usage: include this file when you want to bind container port 4242 to host:4242 and edge port to host.
# Do NOT enable this in production or CI. Remove after debugging.

services:
  unleash:
    ports:
      - "4242:4242"
    # keep the same networks/labels as main compose; compose will merge them

  # Temporary: expose Unleash Edge on host for local debugging (optional)
  # Use UNLEASH_EDGE_HOST_PORT to override the host port (defaults to 3063)
  unleash-edge:
    ports:
      - "${UNLEASH_EDGE_HOST_PORT:-3063}:3063"
    # keep the same networks/labels as main compose; compose will merge them
