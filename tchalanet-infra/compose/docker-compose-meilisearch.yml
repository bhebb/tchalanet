services:
  meilisearch:
    image: ${MEILI_IMAGE:-getmeili/meilisearch:v1.11}
    container_name: ${MEILI_CONTAINER:-${DOCKER_PREFIX:-tchl}-meili}-${ENV}
    env_file:
      - ../envs/${ENV}/.env.merged
      - ../envs/${ENV}/.secrets
    environment:
      # Do NOT interpolate secrets here; env_file provides MEILI_MASTER_KEY
      MEILI_NO_ANALYTICS: "true"
      MEILI_DB_PATH: /meili_data
      MEILI_HTTP_ADDR: 0.0.0.0:7700
    volumes:
      - meili-data:/meili_data
      - ../scripts/docker/meili-entrypoint.sh:/usr/local/bin/meili-entrypoint.sh:ro
    command: ["/usr/local/bin/meili-entrypoint.sh"]
    healthcheck:
      # renvoie {"status":"available"} quand prêt
      test: ["CMD-SHELL", "curl -fsS http://localhost:7700/health | grep -q 'available' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - back
      - edge

volumes:
  meili-data:
    name: meili-${ENV}
