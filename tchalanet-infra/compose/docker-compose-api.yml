services:
  api:
    image: ${API_IMAGE_BASE:-ghcr.io/tchalanet/api}:${IMAGE_TAG}
    container_name: ${API_CONTAINER:-${DOCKER_PREFIX:-tchl}-api}-${ENV}
    env_file:
      - ../envs/${ENV}/.env.merged
      - ../envs/${ENV}/.secrets
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      # Docker-internal DB coords — always use container hostname
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${APP_DB_NAME:-tchalanet_db}
      SPRING_DATASOURCE_USERNAME: ${APP_DB_USER:-app_user}
      TCH_KC_AUDIENCE: tch-api
      # TCH_KC_ISSUER comes from env_file (per-environment external issuer URL)
      # Docker-internal Redis URL
      TCH_REDIS_URL: redis://redis:6379
    depends_on:
      postgres:  { condition: service_healthy }
      keycloak:  { condition: service_healthy }
      redis:     { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "(curl -fsS http://127.0.0.1:${API_PORT:-8080}/api/v1/actuator/health >/dev/null 2>&1) || (wget -qO- http://127.0.0.1:${API_PORT:-8080}/api/v1/actuator/health >/dev/null 2>&1) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 240s
    networks:
      back: {}
      edge:
        aliases: [ "api" ]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${API_LOG_MAX_SIZE:-10m}
        max-file: ${API_LOG_MAX_FILES:-3}
    labels:
      - traefik.enable=${API_TRAEFIK_ENABLE:-true}
      - traefik.docker.network=${DOCKER_NETWORK_EDGE:-edge-${ENV}}
      - traefik.http.services.api-svc.loadbalancer.server.port=${API_PORT:-8080}
