# OTel Collector — local dev pipeline
# Receives OTLP from the API, exports traces to Jaeger and logs to Loki.
# 100% sampling in local; never use this config in prod.

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  attributes/drop-pii:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.request.body
        action: delete
      - key: http.response.body
        action: delete
      - key: enduser.email
        action: delete

exporters:
  debug:
    verbosity: basic

  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: true

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, attributes/drop-pii]
      exporters: [debug, otlp/jaeger]
    logs:
      receivers: [otlp]
      processors: [batch, attributes/drop-pii]
      exporters: [loki]
