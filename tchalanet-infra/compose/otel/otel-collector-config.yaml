# OTel Collector — local dev pipeline
# Receives OTLP from the API, exports to Jaeger.
# 100% sampling in local; never use this config in prod.

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Scrub PII fields from span attributes before export.
  attributes/drop-pii:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.request.body
        action: delete
      - key: http.response.body
        action: delete
      - key: enduser.email
        action: delete

exporters:
  # Local diagnostic exporter: makes received spans visible in `docker logs`.
  debug:
    verbosity: basic

  # Jaeger all-in-one accepts OTLP gRPC on port 4317
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Staging placeholder — replace with Grafana Cloud OTLP endpoint + auth header
  # otlp/grafana:
  #   endpoint: ${GRAFANA_OTLP_ENDPOINT}
  #   headers:
  #     Authorization: "Basic ${GRAFANA_OTLP_TOKEN}"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, attributes/drop-pii]
      exporters: [debug, otlp/jaeger]
