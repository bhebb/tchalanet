# docker-compose-otel.yml
# Local observability stack: OTel Collector + Jaeger (traces) + Loki + Grafana (logs).
# Self-contained: declare the back network as external so docker-compose-project.yml
# does not need to be included.  Networks must already exist (make networks).
#
# Usage:  make up-otel            (dev, ports exposed on localhost)
#         make up-otel ENV=dev    (explicit)
#         make down-otel
#
# Jaeger UI:   http://localhost:16686   (traces)
# Grafana UI:  http://localhost:3100    (logs + traces unified)
# Loki API:    http://localhost:3200
# OTLP HTTP:   http://localhost:4318   (IDE → Spring Boot default)
# OTLP gRPC:   localhost:4317

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    container_name: tchl-otel-collector-${ENV:-dev}
    command: ["--config=/etc/otelcol-contrib/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (IDE → host)
      - "4318:4318"   # OTLP HTTP (IDE → host, Spring Boot default)
    networks:
      back: {}
    depends_on:
      jaeger:
        condition: service_started   # distroless image has no wget; can't use service_healthy
    restart: unless-stopped
    healthcheck:
      disable: true   # distroless — no shell tools; health_check extension on :13133 is the external probe
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  jaeger:
    image: jaegertracing/all-in-one:1.68.0
    container_name: tchl-jaeger-${ENV:-dev}
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=50000
    ports:
      - "16686:16686"  # Jaeger UI → http://localhost:16686
    networks:
      back: {}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:3.5.0
    container_name: tchl-loki-${ENV:-dev}
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./otel/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3200:3100"   # Loki API (3200 host → 3100 container)
    networks:
      back: {}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:12.0.1
    container_name: tchl-grafana-${ENV:-dev}
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./otel/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3100:3000"   # Grafana UI (3100 host → 3000 container)
    networks:
      back: {}
    depends_on:
      loki:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  loki-data: {}
  grafana-data: {}

networks:
  back:
    name: ${DOCKER_NETWORK_BACK:-back-dev}
    external: true
