# docker-compose-dev-local.yml
# Local-dev overlay: exposes host ports and adds extra_hosts for local desktop DNS fix.
# Usage: add "-f compose/docker-compose-dev-local.yml" to any service-up.sh / Makefile call.
# Do NOT include in staging/prod.
services:
  api:
    ports:
      - "8081:8080"
    # local desktop hostnames may resolve to 127.0.0.1 inside Docker — map to host so
    # Spring Security can reach Traefik → Keycloak for OIDC discovery and JWKS.
    extra_hosts:
      - "auth.localtest.me:host-gateway"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  keycloak:
    ports:
      - "8082:8080"

  edge:
    # Same local desktop DNS fix as api.
    extra_hosts:
      - "auth.localtest.me:host-gateway"

  unleash:
    ports:
      - "4242:4242"

  traefik:
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard Traefik
    # Permettre à Traefik d'accéder à l'hôte
    extra_hosts:
      - "host.docker.internal:host-gateway"
