services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.5.4}
    # Use a default value for ENV so container name is stable when not provided
    container_name: ${DOCKER_PREFIX:-tchl}-traefik-${ENV:-dev}
    entrypoint: [ "/bin/sh", "/entrypoint-custom.sh" ]
    # No command: Traefik will use /etc/traefik/traefik.yml by default
    environment:
      - TZ=UTC
      - DOCKER_API_VERSION=1.44
      - ENV=${ENV:-dev}
      - TRAEFIK_API_DASHBOARD=true
      - TRAEFIK_API_INSECURE=${TRAEFIK_API_INSECURE:-false}
      # Force file provider activation (defensive)
      - TRAEFIK_PROVIDERS_FILE_DIRECTORY=/etc/traefik/dynamic
      - TRAEFIK_PROVIDERS_FILE_WATCH=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Configuration statique Traefik
      - ../traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      # Mount the whole dynamic directory so Traefik sees common/ and env/
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
      # Certificats locaux
      - ../traefik/certs:/etc/traefik/certs:ro
      - ../scripts/docker/traefik-entrypoint.sh:/entrypoint-custom.sh:ro
    # Expose les ports host -> container pour permettre l'accès via 127.0.0.1
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # dashboard/API (insecure mode)
    # Permettre à Traefik d'accéder à l'hôte (macOS/Linux)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      edge:
        aliases:
          - traefik.localtest.me
          - api.localtest.me
          - app.localtest.me
          - flags.localtest.me
          - stats.localtest.me
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
