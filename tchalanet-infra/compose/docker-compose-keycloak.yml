services:
  keycloak:
    image: ${KEYCLOAK_IMAGE}
    container_name: ${KEYCLOAK_CONTAINER:-tchl-keycloak}-${ENV}
    env_file:
      - ../envs/${ENV}/.env.merged
      - ../envs/${ENV}/.secrets

    # Expose management port in dev for debugging (health/metrics)
    ports:
      - "${KC_MGMT_PORT:-9000}:9000"

    command: >
      start
      --http-enabled=true
      --hostname-strict=false
      --http-port=8080
      --http-management-enabled=true
      --http-management-port=9000
      --hostname=${KC_HOSTNAME:-auth.localtest.me}
      --proxy-headers=xforwarded
      --import-realm
      --cache=local
      ${KC_EXTRA_ARGS}
    environment:
      # DB (secrets via env_file)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/keycloak_db
      KC_DB_USERNAME: ${KC_DB_USERNAME:-kc_user}
      JAVA_OPTS: >
        -Xms${KC_XMS:-512m} -Xmx${KC_XMX:-1024m}
        -XX:MetaspaceSize=${KC_METASPACE_SIZE:-96M}
        -XX:MaxMetaspaceSize=${KC_MAX_METASPACE_SIZE:-256m}
        -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:+UseStringDeduplication
      TZ: UTC
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${KC_HOSTNAME:-auth.localtest.me}
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL:-https://auth.localtest.me}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_LOG_LEVEL: INFO
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_TRANSACTION_XA_ENABLED: "false"
      KC_LOG_CONSOLE_COLOR: "false"
    volumes:
      - ${KEYCLOAK_DATA_VOLUME:-keycloak-data}:/opt/keycloak/data
      # Mount only generated realm files (not templates or overlays)
      - ../keycloak/realms/${KC_REALM:-tchalanet}-realm.json:/opt/keycloak/data/import/${KC_REALM:-tchalanet}-realm.json:ro

    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/0.0.0.0/9000'"
        ]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 240s

    networks:
      - back
      - edge

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${KC_LOG_MAX_SIZE:-10m}
        max-file: ${KC_LOG_MAX_FILES:-3}

    labels:
      - traefik.enable=${UNLEASH_TRAEFIK_ENABLE:-true}
      - traefik.docker.network=${DOCKER_NETWORK_EDGE:-edge-${ENV}}
      - traefik.http.routers.keycloak.rule=Host(`auth.localtest.me`)
      - traefik.http.routers.keycloak.entrypoints=websecure
      - traefik.http.routers.keycloak.tls=true
      - traefik.http.middlewares.keycloak-https-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.keycloak.middlewares=keycloak-https-headers@docker
      - traefik.http.services.keycloak.loadbalancer.server.port=8080
      - prometheus.scrape=true
      - prometheus.path=/metrics
      - prometheus.port=8080

volumes:
  keycloak-data: {}
