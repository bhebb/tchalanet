services:
  edge-service:
    build:
      context: ../../tchalanet-edge-service
      dockerfile: Dockerfile
    image: ${TCH_EDGE_IMAGE:-tchalanet-edge-service}:${TCH_EDGE_TAG:-local}
    container_name: tchalanet-edge-service-${ENV:-dev}
    restart: unless-stopped

    env_file:
      - ../envs/${ENV}/.env.merged
      - ../envs/${ENV}/.secrets

    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"

    expose:
      - "3000"

    networks:
      - back

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  back:
    name: back-${ENV:-dev}
    external: true
