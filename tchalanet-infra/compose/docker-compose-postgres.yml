services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-18.4}
    container_name: ${POSTGRES_CONTAINER:-tchl-postgres}-${ENV}
    env_file:
      - ../envs/${ENV}/.env.merged
      - ../envs/${ENV}/.secrets

    # Expose port in dev for local IDE access
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

    environment:
      TZ: UTC
      PGDATA: /var/lib/postgresql/data
      POSTGRES_INITDB_ARGS: "${POSTGRES_INITDB_ARGS:---data-checksums --encoding=UTF8 --locale=C.UTF-8}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/docker/postgres-init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
      - ../postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ../postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro

    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

    networks:
      - back

    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${PG_LOG_MAX_SIZE:-10m}"
        max-file: "${PG_LOG_MAX_FILES:-3}"

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME:-pgdata}-${ENV}
